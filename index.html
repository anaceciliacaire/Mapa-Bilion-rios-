<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Fortunas do Brasil - Global & Nacional</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { 
            --bg-dark: #0f1115; --bg-sidebar: #181a20; --bg-card: #22252e;
            --accent: #00d26a; --text-main: #ffffff; --text-muted: #9ba1a6; --border-color: #2c3038;
        }
        
        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg-dark); color: var(--text-main); overflow: hidden; }
        
        #sidebar { min-width: 350px; width: 350px; background: var(--bg-sidebar); display: flex; flex-direction: column; height: 100vh; z-index: 1002; transition: all 0.4s ease; border-right: 1px solid var(--border-color); position: relative; }
        #sidebar.hidden { margin-left: -350px; min-width: 0; }
        #resizer { width: 5px; cursor: col-resize; z-index: 1003; }
        #resizer:hover { background: var(--accent); }

        #toggle-sidebar { position: absolute; right: -28px; top: 20px; width: 28px; height: 60px; background: var(--accent); color: #000; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 0 8px 8px 0; font-weight: bold; z-index: 2000; box-shadow: 4px 0 10px rgba(0,0,0,0.3); transition: 0.2s;}
        
        .sidebar-header { padding: 25px 20px 15px; background: var(--bg-sidebar); text-align: center; border-bottom: 1px solid var(--border-color); }
        .sidebar-title { font-size: 1.1em; font-weight: 700; color: var(--accent); letter-spacing: 0.5px; margin-bottom: 15px; }
        
        #db-selector { width: 100%; padding: 12px; border-radius: 8px; background: #0b0c10; color: #fff; border: 1px solid var(--border-color); font-family: 'Inter', sans-serif; font-size: 14px; cursor: pointer; outline: none; }

        #stats-box { padding: 15px; background: var(--bg-card); margin: 15px; border-radius: 12px; text-align: center; border: 1px solid var(--border-color); flex-shrink: 0; }
        
        #ranking-list { flex: 1 1 auto; overflow-y: auto; padding: 5px 10px; scrollbar-width: thin; scrollbar-color: var(--border-color) transparent; }
        #ranking-list::-webkit-scrollbar { width: 6px; }
        #ranking-list::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        
        .ranking-item { padding: 14px 15px; border-radius: 8px; margin-bottom: 5px; border: 1px solid transparent; font-size: 13px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; }
        .ranking-item:hover { background: var(--bg-card); border-color: var(--border-color); }
        .ranking-name { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
        
        .badge { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: 600; text-transform: uppercase; background: rgba(255,255,255,0.1); color: #ccc; }

        #main-content { flex-grow: 1; display: flex; flex-direction: column; position: relative; }
        #header { padding: 15px 20px; background: var(--bg-sidebar); display: flex; gap: 15px; border-bottom: 1px solid var(--border-color); align-items: center; }
        #map { flex-grow: 1; z-index: 1; background: #0b0c10; }
        
        #theme-toggle { position: absolute; top: 20px; right: 20px; z-index: 1000; background: var(--bg-card); color: var(--text-main); border: 1px solid var(--border-color); padding: 10px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 13px; }
        
        input, select { padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-card); color: var(--text-main); font-family: 'Inter', sans-serif; font-size: 13px; outline: none; }
        
        .popup-card { min-width: 250px; }
        .popup-img { width: 100%; height: 160px; object-fit: cover; object-position: top center; border-radius: 8px; margin-bottom: 10px; }
        
        /* Estilo do Pin com Bandeira */
        .br-icon-marker { border: 2px solid #fff; border-radius: 50%; box-shadow: 0 0 10px rgba(0,0,0,0.5); overflow: hidden; background: white; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div id="toggle-sidebar" onclick="toggleSidebar()"> ◀ </div>
        <div class="sidebar-header">
            <div class="sidebar-title">FORTUNAS DO BRASIL</div>
            <select id="db-selector" onchange="mudarBancoDeDados()">
                <option value="brasil">🇧🇷 Lista: Top 30 Brasil</option>
                <option value="mundo">🌍 Lista: Top 100 Mundo</option>
            </select>
        </div>
        <div id="stats-box">
            <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 5px;">Patrimônio Acumulado</div>
            <strong id="total-money" style="font-size: 1.6em; color: var(--accent); font-weight: 700;">$ 0 Bi</strong>
        </div>
        <div id="ranking-list"></div>
    </div>
    
    <div id="resizer"></div>

    <div id="main-content">
        <button id="theme-toggle" onclick="toggleTheme()">🌓 Visual</button>
        <div id="header">
            <input type="text" id="search" placeholder="🔍 Buscar por nome..." onkeyup="processar()">
            <select id="filterSetor" onchange="processar()">
                <option value="">📊 Todos os Setores</option>
                <option value="Tecnologia">Tecnologia</option>
                <option value="Finanças">Finanças</option>
                <option value="Agronegócio">Agronegócio</option>
                <option value="Varejo">Varejo</option>
                <option value="Luxo">Moda / Luxo</option>
            </select>
        </div>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const map = L.map('map').setView([-15, -50], 4);
        const darkTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        const lightTiles = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
        let currentTheme = 'dark';

        function toggleTheme() {
            if (currentTheme === 'dark') { map.removeLayer(darkTiles); lightTiles.addTo(map); currentTheme = 'light'; }
            else { map.removeLayer(lightTiles); darkTiles.addTo(map); currentTheme = 'dark'; }
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('hidden');
            setTimeout(() => { map.invalidateSize(); }, 500);
        }

        // ==========================================
        // DADOS BRASIL (Original)
        // ==========================================
        const dbBrasil = [
            {n: "Eduardo Saverin", usd: 41.2, o: "Facebook", v: "Brasil", setor: "Tecnologia", lat: -23.55, lng: -46.63, f: "https://neofeed.com.br/wp-content/uploads/2020/07/saverin.jpg", br: true},
            {n: "Vicky Safra", usd: 21.9, o: "Banco Safra", v: "Brasil", setor: "Finanças", lat: -23.55, lng: -46.63, f: "https://s2-g1.glbimg.com/6Wi_2Rfs0gTgTbNYiQRnuB-Q0ZA=/0x141:742x1274/984x0/smart/filters:strip_icc()/i.s3.glbimg.com/v1/AUTH_59edd422c0c84a879bd37670ae4f538a/internal_photos/bs/2020/d/N/wZCHgSTYKwCeJZhUgcbQ/10449036.152501-1-.jpg", br: true},
            {n: "Jorge Paulo Lemann", usd: 16.0, o: "AB InBev", v: "Brasil", setor: "Alimentos e Bebidas", lat: -22.90, lng: -43.17, f: "https://s3.us-east-005.backblazeb2.com/glamurama01/2015/08/JorgePL.jpg", br: true},
            {n: "Marcel Telles", usd: 5.8, o: "AB InBev", v: "Brasil", setor: "Alimentos e Bebidas", lat: -22.90, lng: -43.17, f: "https://medias.revistaoeste.com/wp-content/uploads/2022/04/marcel-herrmann-telles-que-e-vida-carreira-e-reestruturacao-da-brahma-5-jpg.webp", br: true}
        ];

        // ==========================================
        // DADOS MUNDO (Corrigido para ORIGEM)
        // ==========================================
        const dbMundo = [
            {n: "Elon Musk", usd: 342, o: "Tesla", v: "EUA", setor: "Tecnologia", lat: 37.09, lng: -95.71, f: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/cb/Elon_Musk_Royal_Society_crop.jpg/800px-Elon_Musk_Royal_Society_crop.jpg", br: false},
            {n: "Bernard Arnault", usd: 178, o: "LVMH", v: "França", setor: "Luxo", lat: 46.22, lng: 2.21, f: "https://upload.wikimedia.org/wikipedia/commons/d/d4/Bernard_Arnault_2023_%28cropped%29.jpg", br: false},
            {n: "Amancio Ortega", usd: 124, o: "Zara", v: "Espanha", setor: "Varejo", lat: 40.46, lng: -3.74, f: "https://upload.wikimedia.org/wikipedia/commons/thumb/1/15/Amancio_Ortega_2015_%28cropped%29.jpg/800px-Amancio_Ortega_2015_%28cropped%29.jpg", br: false},
            {n: "Mukesh Ambani", usd: 92.5, o: "Reliance", v: "Índia", setor: "Indústria", lat: 20.59, lng: 78.96, f: "https://upload.wikimedia.org/wikipedia/commons/thumb/6/69/Mukesh_Ambani.jpg/800px-Mukesh_Ambani.jpg", br: false},
            
            // Brasileiros no Top 100 - Agora no BRASIL (Origem)
            {n: "Eduardo Saverin", usd: 34.5, o: "Facebook", v: "Brasil", setor: "Tecnologia", lat: -23.55, lng: -46.63, f: "https://neofeed.com.br/wp-content/uploads/2020/07/saverin.jpg", br: true},
            {n: "Vicky Safra", usd: 20.7, o: "Banco Safra", v: "Brasil", setor: "Finanças", lat: -23.55, lng: -46.63, f: "https://s2-g1.glbimg.com/6Wi_2Rfs0gTgTbNYiQRnuB-Q0ZA=/0x141:742x1274/984x0/smart/filters:strip_icc()/i.s3.glbimg.com/v1/AUTH_59edd422c0c84a879bd37670ae4f538a/internal_photos/bs/2020/d/N/wZCHgSTYKwCeJZhUgcbQ/10449036.152501-1-.jpg", br: true}
        ];

        let dadosAtuais = dbBrasil;
        const camadaPins = L.layerGroup().addTo(map);

        function mudarBancoDeDados() {
            const escolha = document.getElementById('db-selector').value;
            dadosAtuais = (escolha === 'brasil') ? dbBrasil : dbMundo;
            if (escolha === 'brasil') map.setView([-15, -50], 4);
            else map.setView([20, 0], 2);
            processar();
        }

        window.renderPopup = function(cityId) {
            const p = window.cityData[cityId][window.cityIndices[cityId]];
            return `
                <div class="popup-card">
                    <img src="${p.f}" class="popup-img" onerror="this.src='https://via.placeholder.com/240x160'">
                    <div style="font-weight:bold; font-size:16px;">${p.br ? p.n + ' 🇧🇷' : p.n}</div>
                    <div style="font-size: 13px; margin-top:8px; color: #9ba1a6;">
                        <b style="color:white">💰 US$ ${p.usd} Bi</b><br>
                        <b style="color:white">📍 Origem:</b> ${p.v}<br>
                        <b style="color:white">💎 Setor:</b> ${p.setor}
                    </div>
                </div>`;
        };

        function processar() {
            camadaPins.clearLayers(); window.cityData = {}; window.cityIndices = {};
            const busca = document.getElementById('search').value.toLowerCase();
            const listaRanking = document.getElementById('ranking-list');
            let total = 0; listaRanking.innerHTML = "";

            const filtrados = dadosAtuais.filter(p => p.n.toLowerCase().includes(busca)).sort((a,b) => b.usd - a.usd);

            filtrados.forEach((p, i) => {
                total += p.usd;
                const cityId = `loc_${p.lat}_${p.lng}`;
                if (!window.cityData[cityId]) { window.cityData[cityId] = []; window.cityIndices[cityId] = 0; }
                window.cityData[cityId].push(p);

                listaRanking.innerHTML += `
                    <div class="ranking-item" onclick="focarPonto('${cityId}', ${window.cityData[cityId].length-1})">
                        <div class="ranking-name">${p.br ? p.n + ' 🇧🇷' : p.n}</div>
                        <b style="color:var(--accent)">$${p.usd}B</b>
                    </div>`;
            });

            for (let id in window.cityData) {
                const p = window.cityData[id][0];
                let icon;
                
                if (p.br) {
                    // PIN ESPECIAL: Bandeira do Brasil
                    icon = L.divIcon({
                        className: 'custom-div-icon',
                        html: `<div class='br-icon-marker'><img src='https://flagcdn.com/w40/br.png' width='30' height='30' style='border-radius:50%'></div>`,
                        iconSize: [30, 30], iconAnchor: [15, 15]
                    });
                } else {
                    // PIN PADRÃO: Vermelho (Mundo)
                    icon = new L.Icon({
                        iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
                        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                        iconSize: [25, 41], iconAnchor: [12, 41]
                    });
                }

                const marker = L.marker([p.lat, p.lng], { icon: icon }).addTo(camadaPins);
                marker.bindPopup(`<div id="popup-${id}">${window.renderPopup(id)}</div>`);
            }
            document.getElementById('total-money').innerText = `$ ${total.toFixed(1)} Bi`;
        }

        window.focarPonto = function(id, idx) {
            window.cityIndices[id] = idx;
            const coords = id.replace('loc_', '').split('_');
            map.setView([coords[0], coords[1]], 6);
            processar(); // Simples refesh para abrir popup
        };
        
        processar();
    </script>
</body>
</html>
