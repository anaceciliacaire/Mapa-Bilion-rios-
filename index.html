<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Bilionários Brasil - Forbes</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #f4f7f6; }
        #header { padding: 15px 20px; background: #2c3e50; color: white; display: flex; flex-wrap: wrap; gap: 15px; align-items: center; z-index: 1001; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .filter-item { display: flex; align-items: center; gap: 8px; }
        input, select { padding: 6px 10px; border-radius: 4px; border: none; outline: none; }
        #map { flex-grow: 1; z-index: 1; }
        .legend { padding: 10px; background: white; line-height: 18px; color: #333; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.2); font-size: 12px; }
        .legend i { width: 12px; height: 12px; float: left; margin-right: 8px; opacity: 0.8; border-radius: 50%; }
        .popup-card { min-width: 180px; }
        .popup-title { font-weight: bold; font-size: 14px; margin-bottom: 5px; color: #2c3e50; border-bottom: 1px solid #eee; padding-bottom: 3px; }
        .popup-text { font-size: 12px; line-height: 1.4; color: #555; }
        .btn-link { display: block; margin-top: 8px; text-align: center; background: #3498db; color: white !important; text-decoration: none; padding: 4px; border-radius: 3px; font-size: 11px; }
    </style>
</head>
<body>

    <div id="header">
        <div class="filter-item"><strong>🔍 Busca:</strong> <input type="text" id="search" placeholder="Nome..." onkeyup="processar()"></div>
        <div class="filter-item">
            <strong>📍 Origem:</strong>
            <select id="filterUf" onchange="processar()">
                <option value="">Todos</option>
                <option value="SP">São Paulo</option>
                <option value="RJ">Rio de Janeiro</option>
                <option value="GO">Goiás</option>
                <option value="RS">Rio Grande do Sul</option>
                <option value="SC">Santa Catarina</option>
                <option value="MA">Maranhão</option>
                <option value="Estrangeiro">Estrangeiros</option>
            </select>
        </div>
        <div style="margin-left:auto; font-size: 11px; color: #bdc3c7;">Círculos proporcionais ao patrimônio (R$)</div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

    <script>
        const map = L.map('map').setView([-15.78, -47.93], 4);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

        const cores = {
            'SP': '#2ecc71', 'RJ': '#e74c3c', 'GO': '#f1c40f', 'RS': '#e67e22', 
            'SC': '#9b59b6', 'MA': '#1abc9c', 'Estrangeiro': '#3498db'
        };

        const dados = [
            {n: "Eduardo Saverin", i: 43, c: "São Paulo", uf: "SP", nac: "Brasileira", r: 227, lat: -23.5505, lng: -46.6333, o: "Facebook"},
            {n: "Vicky Safra", i: 73, c: "Salonpass (Grécia)", uf: "Estrangeiro", nac: "Grega", r: 120.5, lat: 37.9838, lng: 23.7275, o: "Banco Safra"},
            {n: "Jorge Paulo Lemann", i: 85, c: "Rio de Janeiro", uf: "RJ", nac: "Brasileira", r: 88, lat: -22.9068, lng: -43.1729, o: "AB InBev"},
            {n: "David Vélez", i: 44, c: "Medellín (Colômbia)", uf: "Estrangeiro", nac: "Colombiana", r: 55, lat: 6.2442, lng: -75.5812, o: "Nubank"},
            {n: "André Esteves", i: 57, c: "Rio de Janeiro", uf: "RJ", nac: "Brasileira", r: 51, lat: -22.9100, lng: -43.1800, o: "BTG Pactual"},
            {n: "Irmãos Batista (Joesley/Wesley)", i: 55, c: "Formosa", uf: "GO", nac: "Brasileira", r: 50, lat: -15.5391, lng: -47.3323, o: "JBS"},
            {n: "Família Moreira Salles", i: 70, c: "Rio de Janeiro", uf: "RJ", nac: "Brasileira", r: 38, lat: -22.9200, lng: -43.1900, o: "Itaú/CBMM"},
            {n: "Luciano Hang", i: 62, c: "Brusque", uf: "SC", nac: "Brasileira", r: 14, lat: -27.0978, lng: -48.9112, o: "Havan"},
            {n: "Ilson Mateus", i: 61, c: "Imperatriz", uf: "MA", nac: "Brasileira", r: 23.2, lat: -5.5263, lng: -47.4764, o: "Grupo Mateus"},
            {n: "Alexandre Grendene", i: 75, c: "Farroupilha", uf: "RS", nac: "Brasileira", r: 20.5, lat: -29.2238, lng: -51.3470, o: "Grendene"}
            // Os demais bilionários da sua lista podem ser inseridos aqui seguindo o padrão
        ];

        const markers = L.markerClusterGroup();

        function processar() {
            markers.clearLayers();
            const busca = document.getElementById('search').value.toLowerCase();
            const ufFiltro = document.getElementById('filterUf').value;

            dados.filter(p => {
                return p.n.toLowerCase().includes(busca) && (ufFiltro === "" || p.uf === ufFiltro);
            }).forEach(p => {
                const cor = cores[p.uf] || '#7f8c8d';
                // Tamanho proporcional à raiz quadrada do patrimônio para não ocupar a tela toda
                const raio = Math.sqrt(p.r) * 15000; 

                const circle = L.circle([p.lat, p.lng], {
                    color: cor, fillColor: cor, fillOpacity: 0.5, radius: raio
                });

                circle.bindPopup(`
                    <div class="popup-card">
                        <div class="popup-title">${p.n}</div>
                        <div class="popup-text">
                            <b>Nascimento:</b> ${p.c} | ${p.nac}<br>
                            <b>Patrimônio:</b> R$ ${p.r} Bi<br>
                            <b>Origem:</b> ${p.o}
                        </div>
                        <a href="#" class="btn-link">Ver Perfil Completo</a>
                    </div>
                `);
                markers.addLayer(circle);
            });
            map.addLayer(markers);
        }

        const legend = L.control({position: 'bottomright'});
        legend.onAdd = function () {
            const div = L.DomUtil.create('div', 'legend');
            div.innerHTML = '<strong>Legenda de Origem</strong><br>';
            for (let uf in cores) {
                div.innerHTML += `<i style="background:${cores[uf]}"></i> ${uf}<br>`;
            }
            return div;
        };
        legend.addTo(map);

        processar();
    </script>
</body>
</html>
