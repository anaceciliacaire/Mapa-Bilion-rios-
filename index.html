<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Pro - Fortunas do Brasil</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* VARIÁVEIS DO MODO ESCURO (PADRÃO) */
        :root { 
            --bg-dark: #141414; 
            --bg-sidebar: #1c1c1c; 
            --bg-card: #262626;
            --accent: #c5a059; 
            --text-main: #ffffff; 
            --text-muted: #aaaaaa; 
            --border-color: #333333;
            --badge-bg: rgba(255,255,255,0.08);
        }
        
        /* VARIÁVEIS DO MODO CLARO */
        body.light-theme {
            --bg-dark: #eef2f5; 
            --bg-sidebar: #ffffff; 
            --bg-card: #f8f9fa;
            --accent: #b08130; 
            --text-main: #1a1a1a; 
            --text-muted: #6c757d; 
            --border-color: #dee2e6;
            --badge-bg: rgba(0,0,0,0.05);
        }
        
        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg-dark); color: var(--text-main); overflow: hidden; transition: background 0.3s ease, color 0.3s ease; }
        
        #sidebar-left { min-width: 330px; width: 330px; background: var(--bg-sidebar); display: flex; flex-direction: column; height: 100vh; z-index: 1002; transition: 0.4s ease; border-right: 1px solid var(--border-color); position: relative; }
        #sidebar-left.hidden { margin-left: -330px; }

        #toggle-left { position: absolute; right: -28px; top: 50%; transform: translateY(-50%); width: 28px; height: 60px; background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; border-radius: 0 8px 8px 0; box-shadow: 4px 0 10px rgba(0,0,0,0.3); transition: 0.2s; z-index: 1003; }
        
        /* ABA DIREITA (ANÁLISE) */
        #sidebar-right { position: fixed; top: 0; right: 0; width: 100vw; height: 100vh; z-index: 2001; background: var(--bg-dark); overflow-y: auto; display: flex; flex-wrap: wrap; gap: 30px; align-content: start; justify-content: center; padding: 40px; transition: 0.4s ease; }
        #sidebar-right.hidden { right: -100vw; display: none; }

        #toggle-right { position: fixed; right: 0; top: 50%; transform: translateY(-50%); width: 28px; height: 60px; background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; border-radius: 8px 0 0 8px; box-shadow: -4px 0 10px rgba(0,0,0,0.3); transition: 0.2s; z-index: 2005; }
        
        .sidebar-header { padding: 25px 20px 15px; text-align: center; border-bottom: 1px solid var(--border-color); }
        .sidebar-title { font-size: 1.2em; font-weight: 700; color: var(--accent); letter-spacing: 0.5px; margin-bottom: 15px; }
        
        #db-selector { width: 100%; padding: 10px; border-radius: 8px; background: var(--bg-card); color: var(--text-main); border: 1px solid var(--border-color); font-size: 13px; outline: none; cursor: pointer; font-family: 'Inter', sans-serif; }

        #stats-box { padding: 15px; background: var(--bg-card); margin: 10px; border-radius: 12px; text-align: center; border: 1px solid var(--border-color); transition: 0.3s; }
        
        #ranking-list { flex: 1; overflow-y: auto; padding: 5px 10px; }
        .ranking-item { padding: 12px; border-radius: 8px; margin-bottom: 5px; font-size: 13px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
        .ranking-item:hover { background: var(--bg-card); border-color: var(--border-color); }
        .ranking-name { font-weight: 600; font-size: 14px; margin-bottom: 4px; color: var(--text-main); }
        .badge { padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; background: var(--badge-bg); color: var(--text-muted); }

        #main-content { flex-grow: 1; display: flex; flex-direction: column; position: relative; margin: 0; transition: 0.4s ease; }
        #map { flex-grow: 1; z-index: 1; background: var(--bg-dark); }
        
        #search-container { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); width: 300px; z-index: 1001; }
        input { width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-sidebar); color: var(--text-main); outline: none; box-shadow: 0 4px 10px rgba(0,0,0,0.2); transition: 0.3s; }

        #theme-toggle { position: absolute; top: 15px; right: 20px; z-index: 2000; background: var(--bg-card); color: var(--text-main); border: 1px solid var(--border-color); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 13px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); transition: 0.2s; }
        
        /* GRÁFICOS E TOGGLE HISTÓRICO */
        .chart-container { min-width: 400px; max-width: 600px; flex: 1; padding: 20px; background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border-color); transition: 0.3s; display: flex; flex-direction: column; }
        .chart-header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .chart-title { font-size: 14px; font-weight: 700; color: var(--accent); text-transform: uppercase; }
        
        #history-toggle { background: transparent; color: var(--accent); border: 1px solid var(--accent); padding: 6px 10px; border-radius: 6px; font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; outline: none; }
        #history-toggle option { background: var(--bg-card); color: var(--text-main); }
        
        canvas { width: 100% !important; height: auto !important; max-height: 350px; flex-grow: 1; }

        .leaflet-popup-content-wrapper { background: var(--bg-card); color: var(--text-main); border: 1px solid var(--border-color); border-radius: 8px; }
        .leaflet-popup-tip { background: var(--bg-card); }
        .popup-card { min-width: 250px; font-family: 'Inter', sans-serif; }
        .popup-img { width: 100%; height: 160px; object-fit: cover; object-position: top center; border-radius: 6px; margin-bottom: 10px; }
        .popup-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .popup-name { font-weight: 700; font-size: 16px; color: var(--text-main); }
        .popup-data { font-size: 12px; line-height: 1.7; color: var(--text-muted); }
        .popup-data b { color: var(--text-main); font-weight: 600; }

        .legend { padding: 10px; background: var(--bg-card); color: var(--text-main); border-radius: 8px; font-size: 11px; border: 1px solid var(--border-color); box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .legend i { width: 10px; height: 10px; float: left; margin-right: 5px; border-radius: 50%; margin-top: 2px; }
    </style>
</head>
<body>

    <div id="toggle-right" onclick="toggleSidebar('right')"> <i>◀</i> </div>

    <div id="sidebar-left">
        <div id="toggle-left" onclick="toggleSidebar('left')"> <i>◀</i> </div>
        
        <div class="sidebar-header">
            <div class="sidebar-title">FORTUNAS DO BRASIL</div>
            <select id="db-selector" onchange="mudarDB()">
                <option value="brasil">🇧🇷 Versão: Top 30 Brasil</option>
                <option value="mundo">🌍 Versão: Top 50 Mundo</option>
            </select>
        </div>
        <div id="stats-box">
            <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 5px;">Patrimônio Acumulado</div>
            <strong id="total-money" style="font-size: 1.5em; color: var(--accent); font-weight: 700;">$ 0 Bi</strong>
        </div>
        <div id="ranking-list"></div>
    </div>

    <div id="main-content">
        <button id="theme-toggle" onclick="toggleTheme()">🌓 Visual</button>
        <div id="search-container">
            <input type="text" id="search" placeholder="🔍 Buscar por nome ou empresa..." onkeyup="processar()">
        </div>
        <div id="map"></div>
    </div>

    <div id="sidebar-right" class="hidden">
        <div class="chart-container" style="min-width: 100%;">
            <div class="chart-header-flex">
                <span class="chart-title">Evolução do Patrimônio (Top 5)</span>
                <select id="history-toggle" onchange="renderHistoryChart()">
                    <option value="line">📈 Linha do Tempo</option>
                    <option value="bar">📊 Lado a Lado</option>
                </select>
            </div>
            <canvas id="chartHistory"></canvas>
        </div>

        <div class="chart-container">
            <span class="chart-title">Concentração da Riqueza por Setor</span>
            <canvas id="chartSetores"></canvas>
        </div>

        <div class="chart-container">
            <span class="chart-title" id="titleLocalChart">Distribuição Geográfica de Bilionários</span>
            <canvas id="chartLocal"></canvas>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const map = L.map('map').setView([-15, -50], 4);
        const darkTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        const lightTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png');
        let currentTheme = 'dark';

        let lastSetores = {}, lastLocais = {}, lastTop5 = [];
        let setorChart, localChart, historyChart;

        function toggleTheme() {
            document.body.classList.toggle('light-theme');
            if (currentTheme === 'dark') { map.removeLayer(darkTiles); lightTiles.addTo(map); currentTheme = 'light'; } 
            else { map.removeLayer(lightTiles); darkTiles.addTo(map); currentTheme = 'dark'; }
            
            atualizarGraficos(lastSetores, lastLocais);
            renderHistoryChart();
        }

        // --- SISTEMA DE DADOS (COM HISTÓRICO FICTÍCIO PARA TESTE) ---
        // 'h' representa os valores nos anos de 2022, 2024 e 2026
        const dbBrasil = [
            {n: "Eduardo Saverin", usd: 41.2, h: [10.5, 18.2, 41.2], o: "Facebook", v: "Brasil", setor: "Tecnologia", lat: -23.55, lng: -46.63, f: "https://neofeed.com.br/wp-content/uploads/2020/07/saverin.jpg", br: true, uf: "SP"},
            {n: "Vicky Safra", usd: 21.9, h: [7.4, 16.5, 21.9], o: "Banco Safra", v: "Brasil", setor: "Finanças", lat: -23.55, lng: -46.63, f: "https://s2-g1.glbimg.com/6Wi_2Rfs0gTgTbNYiQRnuB-Q0ZA=/0x141:742x1274/984x0/smart/filters:strip_icc()/i.s3.glbimg.com/v1/AUTH_59edd422c0c84a879bd37670ae4f538a/internal_photos/bs/2020/d/N/wZCHgSTYKwCeJZhUgcbQ/10449036.152501-1-.jpg", br: true, uf: "Estrangeiro"},
            {n: "Jorge Paulo Lemann", usd: 16.0, h: [15.1, 15.8, 16.0], o: "AB InBev", v: "Brasil", setor: "Alimentos", lat: -22.90, lng: -43.17, f: "https://s3.us-east-005.backblazeb2.com/glamurama01/2015/08/JorgePL.jpg", br: true, uf: "RJ"},
            {n: "André Esteves", usd: 9.2, h: [5.0, 7.2, 9.2], o: "BTG Pactual", v: "Brasil", setor: "Finanças", lat: -22.90, lng: -43.17, f: "https://upload.wikimedia.org/wikipedia/commons/thumb/7/70/Andre_Esteves.jpg/960px-Andre_Esteves.jpg", br: true, uf: "RJ"},
            {n: "Marcel Telles", usd: 5.8, h: [4.8, 5.2, 5.8], o: "AB InBev", v: "Brasil", setor: "Alimentos", lat: -22.90, lng: -43.17, f: "https://medias.revistaoeste.com/wp-content/uploads/2022/04/marcel-herrmann-telles-que-e-vida-carreira-e-reestruturacao-da-brahma-5-jpg.webp", br: true, uf: "RJ"}
        ];

        const dbMundo = [
            {n: "Elon Musk", usd: 342, h: [219, 180, 342], o: "Tesla", v: "EUA", setor: "Tecnologia", lat: 37, lng: -95, f: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/cb/Elon_Musk_Royal_Society_crop.jpg/800px-Elon_Musk_Royal_Society_crop.jpg", br: false, uf: "EUA"},
            {n: "Mark Zuckerberg", usd: 216, h: [67, 64, 216], o: "Facebook", v: "EUA", setor: "Tecnologia", lat: 37.4, lng: -122, f: "https://upload.wikimedia.org/wikipedia/commons/1/18/Mark_Zuckerberg_F8_2019_Keynote_%2832830578717%29_%28cropped%29.jpg", br: false, uf: "EUA"},
            {n: "Jeff Bezos", usd: 215, h: [171, 114, 215], o: "Amazon", v: "EUA", setor: "Varejo", lat: 47, lng: -122, f: "https://upload.wikimedia.org/wikipedia/commons/6/6c/Jeff_Bezos_at_Amazon_Spheres_Grand_Opening_in_Seattle_-_2018_%2839074799225%29_%28cropped%29.jpg", br: false, uf: "EUA"},
            {n: "Eduardo Saverin", usd: 34.5, h: [10.5, 18.2, 34.5], o: "Facebook", v: "Brasil", setor: "Tecnologia", lat: -23, lng: -46, f: "https://neofeed.com.br/wp-content/uploads/2020/07/saverin.jpg", br: true, uf: "Brasil"},
            {n: "Vicky Safra", usd: 20.7, h: [7.4, 16.5, 20.7], o: "Banco Safra", v: "Brasil", setor: "Finanças", lat: -22, lng: -45, f: "https://s2-g1.glbimg.com/6Wi_2Rfs0gTgTbNYiQRnuB-Q0ZA=/0x141:742x1274/984x0/smart/filters:strip_icc()/i.s3.glbimg.com/v1/AUTH_59edd422c0c84a879bd37670ae4f538a/internal_photos/bs/2020/d/N/wZCHgSTYKwCeJZhUgcbQ/10449036.152501-1-.jpg", br: true, uf: "Brasil"}
        ];

        let dadosAtuais = dbBrasil;
        let modo = 'brasil';
        const camadaPins = L.layerGroup().addTo(map);
        let legendControl = L.control({position: 'bottomright'});

        function toggleSidebar(side) {
            const el = document.getElementById(`sidebar-${side}`);
            const btn = document.getElementById(`toggle-${side}`);
            el.classList.toggle('hidden');
            if (side === 'left') {
                btn.innerHTML = el.classList.contains('hidden') ? "<i>▶</i>" : "<i>◀</i>";
            } else if (side === 'right') {
                if (!el.classList.contains('hidden')) {
                    document.getElementById('sidebar-left').classList.add('hidden');
                    document.getElementById('toggle-left').innerHTML = "<i>▶</i>";
                }
                btn.innerHTML = el.classList.contains('hidden') ? "<i>◀</i>" : "<i>▶</i>";
            }
            setTimeout(() => map.invalidateSize(), 400);
        }

        function mudarDB() {
            modo = document.getElementById('db-selector').value;
            dadosAtuais = (modo === 'brasil') ? dbBrasil : dbMundo;
            if (modo === 'brasil') map.setView([-15, -50], 4);
            else map.setView([20, 0], 2);
            processar();
            atualizarLegenda();
        }

        function processar() {
            camadaPins.clearLayers(); window.cityData = {}; window.cityIndices = {};
            const busca = document.getElementById('search').value.toLowerCase();
            const lista = document.getElementById('ranking-list');
            let total = 0; lista.innerHTML = "";
            
            const filtrados = dadosAtuais.filter(p => p.n.toLowerCase().includes(busca)).sort((a,b) => b.usd - a.usd);
            lastSetores = {}; lastLocais = {};
            lastTop5 = filtrados.slice(0, 5); // Salva os 5 primeiros para o gráfico histórico

            filtrados.forEach((p) => {
                total += p.usd;
                lastSetores[p.setor] = (lastSetores[p.setor] || 0) + p.usd;
                lastLocais[p.uf] = (lastLocais[p.uf] || 0) + 1;

                const cityId = `loc_${p.lat}_${p.lng}`;
                if (!window.cityData[cityId]) { window.cityData[cityId] = []; window.cityIndices[cityId] = 0; }
                const localIndex = window.cityData[cityId].length;
                window.cityData[cityId].push(p);

                lista.innerHTML += `
                    <div class="ranking-item" onclick="focarPonto('${cityId}', ${localIndex})">
                        <div>
                            <div class="ranking-name">${p.br ? p.n+' 🇧🇷' : p.n}</div>
                            <span class="badge">${p.setor}</span>
                        </div>
                        <b style="color:var(--accent)">$${p.usd}B</b>
                    </div>`;
            });

            for (let id in window.cityData) {
                const p = window.cityData[id][0];
                let cor = (modo === 'brasil') ? ({'SP':'green','RJ':'red','GO':'gold','RS':'orange','Estrangeiro':'blue'}[p.uf] || 'grey') : (p.br ? 'gold' : 'white');

                const icon = new L.Icon({
                    iconUrl: `https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-${cor}.png`,
                    shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                    iconSize: [25, 41], iconAnchor: [12, 41]
                });

                L.marker([p.lat, p.lng], {icon}).addTo(camadaPins).bindPopup(`
                    <div class="popup-card">
                        <img src="${p.f}" class="popup-img" onerror="this.src='https://via.placeholder.com/240x160'">
                        <div class="popup-header">
                            <div class="popup-name">${p.br ? p.n+' 🇧🇷' : p.n}</div>
                            <span class="badge" style="border:none;">${p.setor}</span>
                        </div>
                        <div class="popup-data">
                            <b>💰 Fortuna:</b> US$ ${p.usd} Bi<br>
                            <b>💎 Origem:</b> ${p.o}
                        </div>
                    </div>
                `, { maxWidth: 280 });
            }

            document.getElementById('total-money').innerText = `$ ${total.toFixed(1)} Bi`;
            atualizarGraficos(lastSetores, lastLocais);
            renderHistoryChart();
        }

        // --- RENDERIZAÇÃO DOS GRÁFICOS ---
        function atualizarGraficos(setores, locais) {
            const ctxSetores = document.getElementById('chartSetores').getContext('2d');
            const ctxLocal = document.getElementById('chartLocal').getContext('2d');
            if (setorChart) setorChart.destroy(); if (localChart) localChart.destroy();

            const isLight = document.body.classList.contains('light-theme');
            Chart.defaults.color = isLight ? '#6c757d' : '#aaaaaa';
            Chart.defaults.font.family = "'Inter', sans-serif";

            setorChart = new Chart(ctxSetores, {
                type: 'doughnut',
                data: { labels: Object.keys(setores), datasets: [{ data: Object.values(setores), backgroundColor: ['#c5a059', '#3498db', '#2ecc71', '#e74c3c', '#9b59b6', '#e67e22'], borderWidth: 0 }] },
                options: { plugins: { legend: { display: true, position: 'right' } }, cutout: '70%' }
            });

            localChart = new Chart(ctxLocal, {
                type: 'bar',
                data: { labels: Object.keys(locais), datasets: [{ label: 'Bilionários', data: Object.values(locais), backgroundColor: '#c5a059' }] },
                options: { 
                    indexAxis: 'y',
                    scales: { x: { grid: { display: false }, ticks: { color: isLight ? '#6c757d' : '#aaaaaa' } }, y: { ticks: { color: isLight ? '#1a1a1a' : '#ffffff' } } },
                    plugins: { legend: { display: false } }
                }
            });
        }

        // GRÁFICO HISTÓRICO (ALTERNÁVEL)
        function renderHistoryChart() {
            const ctx = document.getElementById('chartHistory').getContext('2d');
            if (historyChart) historyChart.destroy();
            
            const tipo = document.getElementById('history-toggle').value;
            const isLight = document.body.classList.contains('light-theme');
            const anos = ['2022', '2024', '2026'];
            const cores = ['#c5a059', '#3498db', '#2ecc71', '#e74c3c', '#9b59b6'];

            let dataConfig, optionsConfig;

            if (tipo === 'line') {
                // Modo Linha do Tempo (X = Anos, Linhas = Pessoas)
                dataConfig = {
                    labels: anos,
                    datasets: lastTop5.map((p, i) => ({
                        label: p.n,
                        data: p.h,
                        borderColor: cores[i % cores.length],
                        backgroundColor: cores[i % cores.length],
                        tension: 0.3,
                        borderWidth: 3
                    }))
                };
                optionsConfig = {
                    responsive: true,
                    plugins: { legend: { display: true, position: 'bottom' } },
                    scales: {
                        x: { ticks: { color: isLight ? '#6c757d' : '#aaaaaa' } },
                        y: { title: { display: true, text: 'US$ Bilhões', color: isLight ? '#1a1a1a' : '#ffffff' }, ticks: { color: isLight ? '#1a1a1a' : '#ffffff' } }
                    }
                };
            } else {
                // Modo Lado a Lado (X = Pessoas, Barras = Anos)
                // Pega os valores do ano 1 (2022), ano 2 (2024) e ano 3 (2026)
                dataConfig = {
                    labels: lastTop5.map(p => p.n.split(" ")[0]), // Pega só o primeiro nome
                    datasets: [
                        { label: '2022', data: lastTop5.map(p => p.h[0]), backgroundColor: isLight ? '#dee2e6' : '#333333' },
                        { label: '2024', data: lastTop5.map(p => p.h[1]), backgroundColor: '#7f8c8d' },
                        { label: '2026', data: lastTop5.map(p => p.h[2]), backgroundColor: '#c5a059' }
                    ]
                };
                optionsConfig = {
                    responsive: true,
                    plugins: { legend: { display: true, position: 'top' } },
                    scales: {
                        x: { ticks: { color: isLight ? '#1a1a1a' : '#ffffff' } },
                        y: { title: { display: true, text: 'US$ Bilhões' }, ticks: { color: isLight ? '#6c757d' : '#aaaaaa' } }
                    }
                };
            }

            historyChart = new Chart(ctx, {
                type: tipo,
                data: dataConfig,
                options: optionsConfig
            });
        }

        window.focarPonto = function(id, idx) {
            window.cityIndices[id] = idx;
            const coords = id.replace('loc_', '').split('_');
            map.setView([coords[0], coords[1]], 6);
            camadaPins.eachLayer(layer => {
                if(layer.getLatLng().lat == coords[0] && layer.getLatLng().lng == coords[1]) layer.openPopup();
            });
        };

        function atualizarLegenda() {
            if (map.legendControl) map.removeControl(map.legendControl);
            legendControl.onAdd = function () {
                const div = L.DomUtil.create('div', 'legend');
                if (modo === 'brasil') {
                    div.innerHTML = '<strong style="color:var(--text-main)">📍 Origem (UF)</strong><br>';
                    const lCores = {'SP':'#2ecc71','RJ':'#e74c3c','GO':'#f1c40f','RS':'#e67e22','Outro':'#7f8c8d'};
                    for (let k in lCores) div.innerHTML += `<i style="background:${lCores[k]}"></i> ${k}<br>`;
                } else {
                    div.innerHTML = '<strong style="color:var(--text-main)">🌎 Classificação</strong><br>';
                    div.innerHTML += `<i style="background:#fff; border:1px solid #ccc"></i> Internacional<br>`;
                    div.innerHTML += `<i style="background:#f1c40f"></i> Brasileiros<br>`;
                }
                return div;
            };
            legendControl.addTo(map);
            map.legendControl = legendControl;
        }

        processar();
    </script>
</body>
</html>
