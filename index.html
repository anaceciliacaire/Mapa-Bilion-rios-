<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Pro - Fortunas do Brasil & Mundo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* MODO ESCURO (VERDE ESMERALDA) */
        :root { 
            --bg-dark: #141414; 
            --bg-sidebar: #1c1c1c; 
            --bg-card: #262626;
            --accent: #3BB08F; /* Novo Verde */
            --text-main: #ffffff; 
            --text-muted: #aaaaaa; 
            --border-color: #333333;
            --badge-bg: rgba(59, 176, 143, 0.1);
        }
        
        /* MODO CLARO (AZUL ACINZENTADO E LETRAS ESCURAS) */
        body.light-theme {
            --bg-dark: #cbd7e3; /* Fundo do mapa levemente mais escuro que as abas */
            --bg-sidebar: #C5D0E6; /* Cor solicitada */
            --bg-card: #b6c3d9;
            --accent: #414A4C; /* Letras solicitadas */
            --text-main: #414A4C; /* Letras solicitadas */
            --text-muted: #5a6466; 
            --border-color: #aebcd0;
            --badge-bg: rgba(65, 74, 76, 0.1);
        }
        
        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg-dark); color: var(--text-main); overflow: hidden; transition: background 0.3s ease, color 0.3s ease; }
        
        #sidebar-left { min-width: 330px; width: 330px; background: var(--bg-sidebar); display: flex; flex-direction: column; height: 100vh; z-index: 1002; transition: 0.4s ease; border-right: 1px solid var(--border-color); position: relative; }
        #sidebar-left.hidden { margin-left: -330px; }

        #toggle-left { position: absolute; right: -28px; top: 50%; transform: translateY(-50%); width: 28px; height: 60px; background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; border-radius: 0 8px 8px 0; box-shadow: 4px 0 10px rgba(0,0,0,0.2); transition: 0.2s; z-index: 1003; border: none; }
        
        #sidebar-right { position: fixed; top: 0; right: 0; width: 100vw; height: 100vh; z-index: 2001; background: var(--bg-dark); overflow-y: auto; display: flex; flex-wrap: wrap; gap: 30px; align-content: start; justify-content: center; padding: 40px; transition: 0.4s ease; }
        #sidebar-right.hidden { right: -100vw; display: none; }

        #toggle-right { position: fixed; right: 0; top: 50%; transform: translateY(-50%); width: 28px; height: 60px; background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; border-radius: 8px 0 0 8px; box-shadow: -4px 0 10px rgba(0,0,0,0.2); transition: 0.2s; z-index: 2005; border: none; }

        .sidebar-header { padding: 25px 20px 15px; text-align: center; border-bottom: 1px solid var(--border-color); }
        .sidebar-title { font-size: 1.2em; font-weight: 700; color: var(--accent); letter-spacing: 0.5px; margin-bottom: 15px; }
        
        #db-selector { width: 100%; padding: 10px; border-radius: 8px; background: var(--bg-card); color: var(--text-main); border: 1px solid var(--border-color); font-size: 13px; outline: none; cursor: pointer; font-family: 'Inter', sans-serif; font-weight: 600; }

        #stats-box { padding: 15px; background: var(--bg-card); margin: 10px; border-radius: 12px; text-align: center; border: 1px solid var(--border-color); }
        
        #ranking-list { flex: 1; overflow-y: auto; padding: 5px 10px; }
        .ranking-item { padding: 12px; border-radius: 8px; margin-bottom: 5px; font-size: 13px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; }
        .ranking-item:hover { background: var(--bg-card); border-color: var(--border-color); }
        .ranking-name { font-weight: 600; font-size: 14px; color: var(--text-main); }
        
        .badge { padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; background: var(--badge-bg); color: var(--text-main); }

        #search-container { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); width: 300px; z-index: 1001; }
        input { width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-sidebar); color: var(--text-main); outline: none; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        #theme-toggle { position: absolute; top: 15px; right: 20px; z-index: 2000; background: var(--bg-card); color: var(--text-main); border: 1px solid var(--border-color); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 13px; transition: 0.2s; }

        .chart-container { min-width: 400px; max-width: 600px; flex: 1; padding: 20px; background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border-color); }
        .chart-title { font-size: 14px; font-weight: 700; color: var(--accent); text-transform: uppercase; margin-bottom: 20px; text-align: center; }
        
        /* POPUP */
        .leaflet-popup-content-wrapper { background: var(--bg-card); color: var(--text-main); border: 1px solid var(--border-color); }
        .leaflet-popup-tip { background: var(--bg-card); }
        .popup-card { min-width: 250px; }
        .popup-img { width: 100%; height: 160px; object-fit: cover; border-radius: 6px; margin-bottom: 10px; }
        .popup-data b { color: var(--accent); }

        .legend { padding: 10px; background: var(--bg-card); color: var(--text-main); border-radius: 8px; font-size: 11px; border: 1px solid var(--border-color); }
        .legend i { width: 10px; height: 10px; float: left; margin-right: 5px; border-radius: 50%; margin-top: 2px; }
    </style>
</head>
<body>

    <div id="toggle-right" onclick="toggleSidebar('right')"> <i>◀</i> </div>

    <div id="sidebar-left">
        <div id="toggle-left" onclick="toggleSidebar('left')"> <i>◀</i> </div>
        <div class="sidebar-header">
            <div class="sidebar-title">FORTUNAS DO BRASIL</div>
            <select id="db-selector" onchange="mudarDB()">
                <option value="brasil">🇧🇷 Versão: Top 30 Brasil</option>
                <option value="mundo">🌍 Versão: Top 50 Mundo</option>
            </select>
        </div>
        <div id="stats-box">
            <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 5px;">Patrimônio Acumulado</div>
            <strong id="total-money" style="font-size: 1.5em; color: var(--accent); font-weight: 700;">$ 0 Bi</strong>
        </div>
        <div id="ranking-list"></div>
    </div>

    <div id="main-content">
        <button id="theme-toggle" onclick="toggleTheme()">🌓 Visual</button>
        <div id="search-container">
            <input type="text" id="search" placeholder="🔍 Buscar por nome..." onkeyup="processar()">
        </div>
        <div id="map" style="flex-grow:1;"></div>
    </div>

    <div id="sidebar-right" class="hidden">
        <div class="chart-container" style="min-width: 100%;">
            <div class="chart-header-flex" style="display:flex; justify-content: space-between;">
                <span class="chart-title">Evolução do Patrimônio (Top 5)</span>
                <select id="history-toggle" onchange="renderHistoryChart()" style="background: var(--bg-sidebar); color: var(--text-main); border: 1px solid var(--border-color); border-radius: 5px;">
                    <option value="line">📈 Linha do Tempo</option>
                    <option value="bar">📊 Lado a Lado</option>
                </select>
            </div>
            <canvas id="chartHistory"></canvas>
        </div>
        <div class="chart-container">
            <span class="chart-title">Concentração por Setor</span>
            <canvas id="chartSetores"></canvas>
        </div>
        <div class="chart-container">
            <span class="chart-title">Distribuição Geográfica</span>
            <canvas id="chartLocal"></canvas>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const map = L.map('map').setView([-15, -50], 4);
        const darkTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        const lightTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png');
        let currentTheme = 'dark';

        function toggleTheme() {
            document.body.classList.toggle('light-theme');
            if (currentTheme === 'dark') { map.removeLayer(darkTiles); lightTiles.addTo(map); currentTheme = 'light'; }
            else { map.removeLayer(lightTiles); darkTiles.addTo(map); currentTheme = 'dark'; }
            processar(); // Recalcula para atualizar cores dos gráficos
        }

        const getAvatar = (name) => `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=262626&color=3BB08F&size=240`;
        const gerH = (val) => [(val * 0.75).toFixed(1), (val * 0.9).toFixed(1), val];

        // DADOS BRASIL
        const dbBrasil = [
            {n: "Eduardo Saverin", usd: 41.2, h: gerH(41.2), setor: "Tecnologia", lat: -23.55, lng: -46.63, br: true, uf: "SP", o: "Facebook", v: "Singapura", f: "https://neofeed.com.br/wp-content/uploads/2020/07/saverin.jpg"},
            {n: "Vicky Safra", usd: 21.9, h: gerH(21.9), setor: "Finanças", lat: -23.55, lng: -46.63, br: true, uf: "Estrangeiro", o: "Banco Safra", v: "Suíça", f: "https://s2-g1.glbimg.com/6Wi_2Rfs0gTgTbNYiQRnuB-Q0ZA=/0x141:742x1274/984x0/smart/filters:strip_icc()/i.s3.glbimg.com/v1/AUTH_59edd422c0c84a879bd37670ae4f538a/internal_photos/bs/2020/d/N/wZCHgSTYKwCeJZhUgcbQ/10449036.152501-1-.jpg"},
            {n: "Jorge Paulo Lemann", usd: 16.0, h: gerH(16), setor: "Alimentos", lat: -22.90, lng: -43.17, br: true, uf: "RJ", o: "AB InBev", v: "Brasil", f: "https://s3.us-east-005.backblazeb2.com/glamurama01/2015/08/JorgePL.jpg"}
        ];

        // DADOS MUNDO (SIMPLIFICADO TOP 5 + BRASILEIROS)
        const dbMundo = [
            {n:"Elon Musk", usd:342, v:"EUA", o:"Tesla", setor:"Tecnologia", lat:37, lng:-95, h:gerH(342), br:false, uf:"EUA", f:getAvatar("Elon Musk")},
            {n:"Mark Zuckerberg", usd:216, v:"EUA", o:"Facebook", setor:"Tecnologia", lat:37.4, lng:-122, h:gerH(216), br:false, uf:"EUA", f:getAvatar("Mark Zuckerberg")},
            {n:"Jeff Bezos", usd:215, v:"EUA", o:"Amazon", setor:"Varejo", lat:47, lng:-122, h:gerH(215), br:false, uf:"EUA", f:getAvatar("Jeff Bezos")},
            {n:"Eduardo Saverin", usd:34.5, v:"Singapura", o:"Facebook", setor:"Tecnologia", lat:-23.55, lng:-46.63, h:gerH(34.5), br:true, uf:"Brasil", f:getAvatar("Eduardo Saverin")},
            {n:"Vicky Safra", usd:20.7, v:"Suíça", o:"Banco Safra", setor:"Finanças", lat:-23.55, lng:-46.63, h:gerH(20.7), br:true, uf:"Brasil", f:getAvatar("Vicky Safra")}
        ];

        let dadosAtuais = dbBrasil;
        let modo = 'brasil';
        let setorChart, localChart, historyChart;
        const camadaPins = L.layerGroup().addTo(map);

        function toggleSidebar(side) {
            const el = document.getElementById(`sidebar-${side}`);
            el.classList.toggle('hidden');
            setTimeout(() => map.invalidateSize(), 400);
        }

        function mudarDB() {
            modo = document.getElementById('db-selector').value;
            dadosAtuais = (modo === 'brasil') ? dbBrasil : dbMundo;
            if (modo === 'brasil') map.setView([-15, -50], 4);
            else map.setView([20, 0], 2);
            processar();
        }

        function processar() {
            camadaPins.clearLayers();
            const busca = document.getElementById('search').value.toLowerCase();
            const lista = document.getElementById('ranking-list');
            let total = 0; lista.innerHTML = "";
            
            const filtrados = dadosAtuais.filter(p => p.n.toLowerCase().includes(busca)).sort((a,b) => b.usd - a.usd);
            const setoresData = {}; const localData = {};
            const top5 = filtrados.slice(0, 5);

            filtrados.forEach((p) => {
                total += p.usd;
                setoresData[p.setor] = (setoresData[p.setor] || 0) + p.usd;
                localData[p.uf] = (localData[p.uf] || 0) + 1;

                lista.innerHTML += `
                    <div class="ranking-item">
                        <div>
                            <div class="ranking-name">${p.br ? p.n+' 🇧🇷' : p.n}</div>
                            <span class="badge">${p.setor}</span>
                        </div>
                        <b style="color:var(--accent)">$${p.usd}B</b>
                    </div>`;

                let cor = (modo === 'brasil') ? ({'SP':'green','RJ':'red','GO':'gold','RS':'orange'}[p.uf] || 'grey') : (p.br ? 'gold' : 'white');
                const icon = new L.Icon({
                    iconUrl: `https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-${cor}.png`,
                    iconSize: [25, 41], iconAnchor: [12, 41]
                });

                L.marker([p.lat, p.lng], {icon}).addTo(camadaPins).bindPopup(`
                    <div class="popup-card">
                        <img src="${p.f}" class="popup-img" onerror="this.src='https://via.placeholder.com/240x160'">
                        <div class="popup-name">${p.n}</div>
                        <div class="popup-data"><b>💰 US$ ${p.usd} Bi</b><br><b>💎 Origem:</b> ${p.o}</div>
                    </div>`);
            });

            document.getElementById('total-money').innerText = `$ ${total.toFixed(1)} Bi`;
            atualizarGraficos(setoresData, localData, top5);
        }

        function atualizarGraficos(setores, locais, top5) {
            const isLight = document.body.classList.contains('light-theme');
            Chart.defaults.color = isLight ? '#414A4C' : '#aaaaaa';

            if (setorChart) setorChart.destroy();
            setorChart = new Chart(document.getElementById('chartSetores'), {
                type: 'doughnut',
                data: { labels: Object.keys(setores), datasets: [{ data: Object.values(setores), backgroundColor: ['#3BB08F', '#4a90e2', '#f39c12', '#e74c3c'], borderWidth: 0 }] },
                options: { plugins: { legend: { position: 'bottom' } } }
            });

            if (localChart) localChart.destroy();
            localChart = new Chart(document.getElementById('chartLocal'), {
                type: 'bar',
                data: { labels: Object.keys(locais), datasets: [{ data: Object.values(locais), backgroundColor: '#3BB08F' }] },
                options: { indexAxis: 'y', plugins: { legend: { display: false } } }
            });

            renderHistoryChart(top5);
        }

        function renderHistoryChart(top5) {
            if (historyChart) historyChart.destroy();
            const tipo = document.getElementById('history-toggle').value;
            historyChart = new Chart(document.getElementById('chartHistory'), {
                type: tipo,
                data: {
                    labels: ['2022', '2024', '2026'],
                    datasets: top5.map((p, i) => ({
                        label: p.n.split(" ")[0],
                        data: p.h,
                        borderColor: ['#3BB08F', '#4a90e2', '#f39c12', '#e74c3c', '#9b59b6'][i],
                        backgroundColor: ['#3BB08F', '#4a90e2', '#f39c12', '#e74c3c', '#9b59b6'][i],
                        fill: false
                    }))
                }
            });
        }

        mudarDB();
    </script>
</body>
</html>
