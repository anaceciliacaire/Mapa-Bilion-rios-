<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel de Riqueza - Brasil</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { 
            --bg-dark: #0f1115; 
            --bg-sidebar: #181a20; 
            --bg-card: #22252e;
            --accent: #00d26a; 
            --text-main: #ffffff; 
            --text-muted: #9ba1a6;
            --border-color: #2c3038;
        }
        
        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg-dark); color: var(--text-main); overflow: hidden; }
        
        /* Sidebar Refinada */
        #sidebar { min-width: 350px; width: 350px; background: var(--bg-sidebar); display: flex; flex-direction: column; height: 100vh; z-index: 1002; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); position: relative; border-right: 1px solid var(--border-color); }
        #sidebar.hidden { margin-left: -350px; min-width: 0; }
        
        #resizer { width: 5px; cursor: col-resize; background: transparent; z-index: 1003; transition: 0.2s; }
        #resizer:hover { background: var(--accent); }

        #toggle-sidebar { position: absolute; right: -28px; top: 20px; width: 28px; height: 60px; background: var(--accent); color: #000; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 0 8px 8px 0; font-weight: bold; z-index: 2000; box-shadow: 4px 0 10px rgba(0,0,0,0.3); font-size: 16px; transition: 0.2s;}
        #toggle-sidebar:hover { background: #00b55b; width: 32px; right: -32px; }
        
        .sidebar-header { padding: 30px 20px 20px; background: var(--bg-sidebar); text-align: center; font-weight: 700; color: var(--accent); letter-spacing: 0.5px; font-size: 1.1em; border-bottom: 1px solid var(--border-color); }
        
        #stats-box { padding: 18px; background: var(--bg-card); margin: 15px; border-radius: 12px; text-align: center; border: 1px solid var(--border-color); flex-shrink: 0; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        /* Lista e Scrollbar */
        #ranking-list { flex: 1 1 auto; overflow-y: auto; min-height: 0; padding: 5px 10px; scrollbar-width: thin; scrollbar-color: var(--border-color) transparent; }
        #ranking-list::-webkit-scrollbar { width: 6px; }
        #ranking-list::-webkit-scrollbar-track { background: transparent; }
        #ranking-list::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        #ranking-list::-webkit-scrollbar-thumb:hover { background: #4a505c; }
        
        .ranking-item { padding: 14px 15px; border-radius: 8px; margin-bottom: 5px; border: 1px solid transparent; font-size: 13px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; }
        .ranking-item:hover { background: var(--bg-card); border-color: var(--border-color); transform: translateY(-1px); }
        .ranking-name { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
        
        /* Etiquetas (Badges) */
        .badge { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: 600; text-transform: uppercase; background: rgba(0, 210, 106, 0.1); color: var(--accent); border: 1px solid rgba(0, 210, 106, 0.2); }

        /* Área Principal */
        #main-content { flex-grow: 1; display: flex; flex-direction: column; position: relative; }
        #header { padding: 15px 20px; background: var(--bg-sidebar); display: flex; gap: 15px; border-bottom: 1px solid var(--border-color); align-items: center; flex-wrap: wrap; }
        #map { flex-grow: 1; z-index: 1; background: #0b0c10; }
        
        #theme-toggle { position: absolute; top: 20px; right: 20px; z-index: 1000; background: var(--bg-card); color: var(--text-main); border: 1px solid var(--border-color); padding: 10px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 13px; font-family: 'Inter', sans-serif; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        #theme-toggle:hover { background: #2c3038; border-color: var(--accent); }

        /* Inputs Refinados */
        input, select { padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-card); color: var(--text-main); font-family: 'Inter', sans-serif; font-size: 13px; outline: none; transition: 0.2s; }
        input:focus, select:focus { border-color: var(--accent); }

        /* Balão do Mapa (Popup) Refinado */
        .leaflet-popup-content-wrapper { background: var(--bg-card); color: var(--text-main); border-radius: 12px; border: 1px solid var(--border-color); box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .leaflet-popup-tip { background: var(--bg-card); }
        .popup-card { min-width: 260px; font-family: 'Inter', sans-serif; text-align: left; }
        .popup-img { width: 100%; height: 170px; object-fit: cover; object-position: top center; border-radius: 8px; margin-bottom: 12px; }
        .popup-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .popup-name { font-weight: 700; font-size: 17px; }
        .popup-data { font-size: 12.5px; line-height: 1.7; color: var(--text-muted); }
        .popup-data b { color: var(--text-main); font-weight: 600; }
        
        .carousel-nav { display: flex; justify-content: space-between; background: rgba(0,0,0,0.2); padding: 8px 12px; border-radius: 8px; margin-top: 15px; align-items: center; border: 1px solid var(--border-color); }
        .carousel-btn { background: transparent; color: var(--accent); border: 1px solid var(--accent); padding: 4px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .carousel-btn:hover { background: var(--accent); color: #000; }
        
        .legend { padding: 12px; background: rgba(24, 26, 32, 0.9); color: var(--text-main); border-radius: 10px; font-size: 12px; border: 1px solid var(--border-color); font-family: 'Inter', sans-serif; }
        .legend i { width: 12px; height: 12px; float: left; margin-right: 8px; border-radius: 50%; margin-top: 2px; }
    </style>
</head>

        window.renderPopup = function(cityId) {

                        <b>📈 Empresas:</b> ${p.e}
                    </div>
                    ${nav}
                </div>
            `;
        };

        window.changeSlide = function(cityId, dir) {
            const total = window.cityData[cityId].length;
            let newIdx = (window.cityIndices[cityId] + dir + total) % total;
            window.cityIndices[cityId] = newIdx;
            document.getElementById('popup-' + cityId).innerHTML = window.renderPopup(cityId);
        };

        window.abrirDoRanking = function(cityId, idxList) {
            window.cityIndices[cityId] = idxList;
            const markerData = window.cidadesMap[cityId];
            map.setView([markerData.lat, markerData.lng], 12);
            markerData.marker.openPopup();
            setTimeout(() => { document.getElementById('popup-' + cityId).innerHTML = window.renderPopup(cityId); }, 100);
        };

        function processar() {
            camadaPins.clearLayers(); window.cityData = {}; window.cityIndices = {}; window.cidadesMap = {};
            
            const busca = document.getElementById('search').value.toLowerCase();
            const ufFiltro = document.getElementById('filterUf').value;
            const setorFiltro = document.getElementById('filterSetor').value;
            
            const listaRanking = document.getElementById('ranking-list');
            let totalBi = 0; listaRanking.innerHTML = "";

            const filtrados = dados.filter(p => {
                const bUf = (p.uf === ufFiltro || ufFiltro === "");
                const bSetor = (p.setor === setorFiltro || setorFiltro === "");
                return p.n.toLowerCase().includes(busca) && bUf && bSetor;
            }).sort((a,b) => b.r - a.r);

            let cityCounter = 0; const tempMap = {};
            filtrados.forEach(p => {
                totalBi += p.r; const coordKey = `${p.lat},${p.lng}`;
                if (!tempMap[coordKey]) {
                    const cid = 'city_' + cityCounter++;
                    tempMap[coordKey] = cid; window.cityData[cid] = []; window.cityIndices[cid] = 0;
                }
                const cityId = tempMap[coordKey];
                
                listaRanking.innerHTML += `
                    <div class="ranking-item" onclick="abrirDoRanking('${cityId}', ${window.cityData[cityId].length})">
                        <div>
                            <div class="ranking-name">${p.n}</div>
                            <span class="badge">${p.setor}</span>
                        </div>
                        <b style="color:var(--accent); font-size: 14px;">R$ ${p.r}B</b>
                    </div>
                `;
                window.cityData[cityId].push(p);
            });

            for (let coord in tempMap) {
                const cityId = tempMap[coord]; const p = window.cityData[cityId][0];
                const icon = new L.Icon({
                    iconUrl: `https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-${coresPins[p.uf] || 'blue'}.png`,
                    shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                    iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
                });
                const marker = L.marker([p.lat, p.lng], { icon: icon }).addTo(camadaPins);
                marker.bindPopup(`<div id="popup-${cityId}">${window.renderPopup(cityId)}</div>`, { maxWidth: 280 });
                window.cidadesMap[cityId] = { lat: p.lat, lng: p.lng, marker: marker };
            }
            document.getElementById('total-money').innerText = `R$ ${totalBi.toFixed(1)} Bi`;
        }
        
        const legend = L.control({position: 'bottomright'});
        legend.onAdd = function () {
            const div = L.DomUtil.create('div', 'legend');
            div.innerHTML = '<strong style="color:var(--accent)">🌎 Legenda (Estado)</strong><br style="margin-bottom:5px;">';
            const legendCores = { 'SP': '#2ecc71', 'RJ': '#e74c3c', 'GO': '#f1c40f', 'RS': '#e67e22', 'SC': '#9b59b6', 'CE': '#7f8c8d', 'Exterior': '#3498db' };
            for (let k in legendCores) {
                div.innerHTML += `<i style="background:${legendCores[k]}"></i> ${k}<br>`;
            }
            return div;
        };
        legend.addTo(map);

        processar();
    </script>
</body>
</html>
