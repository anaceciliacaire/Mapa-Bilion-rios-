<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Bilionários - Forbes 30</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --bg-dark: #1a1a1a; --bg-sidebar: #222; --accent: #2ecc71; --text: white; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg-dark); color: var(--text); overflow: hidden; }
        
        #sidebar { min-width: 330px; width: 330px; background: var(--bg-sidebar); display: flex; flex-direction: column; height: 100vh; z-index: 1002; transition: all 0.5s ease; position: relative; }
        #sidebar.hidden { margin-left: -330px; min-width: 0; }
        #resizer { width: 4px; cursor: col-resize; background: #333; z-index: 1003; }
        #resizer:hover { background: var(--accent); }

        #toggle-sidebar { position: absolute; right: -30px; top: 20px; width: 30px; height: 60px; background: var(--accent); color: #000; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 0 8px 8px 0; font-weight: bold; z-index: 2000; box-shadow: 2px 0 5px rgba(0,0,0,0.3); font-size: 18px; }
        
        .sidebar-header { padding: 25px 20px; background: #111; text-align: center; font-weight: bold; color: var(--accent); border-bottom: 1px solid #333; }
        #stats-box { padding: 15px; background: #2d2d2d; margin: 10px; border-radius: 8px; text-align: center; border-left: 5px solid var(--accent); flex-shrink: 0; }
        
        #ranking-list { flex: 1 1 auto; overflow-y: auto; min-height: 0; padding: 5px; scrollbar-width: thin; scrollbar-color: var(--accent) #222; }
        #ranking-list::-webkit-scrollbar { width: 6px; }
        #ranking-list::-webkit-scrollbar-track { background: #222; }
        #ranking-list::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
        
        .ranking-item { padding: 12px 15px; border-bottom: 1px solid #333; font-size: 13px; display: flex; justify-content: space-between; cursor: pointer; }
        .ranking-item:hover { background: #333; }

        #main-content { flex-grow: 1; display: flex; flex-direction: column; position: relative; }
        #header { padding: 12px 20px; background: #111; display: flex; gap: 15px; border-bottom: 1px solid #333; align-items: center; }
        #map { flex-grow: 1; z-index: 1; }

        /* Estilo do Balão */
        .popup-card { color: #222; min-width: 250px; font-family: sans-serif; }
        .popup-img { width: 100%; height: 180px; object-fit: cover; object-position: top center; border-radius: 4px; margin-bottom: 10px; border: 1px solid #eee; }
        .popup-data { font-size: 12px; line-height: 1.6; color: #333; }
        .popup-data b { color: #000; }
        .carousel-nav { display: flex; justify-content: space-between; background: #f1f1f1; padding: 8px; border-radius: 4px; margin-top: 10px; align-items: center; }
        .carousel-btn { background: var(--accent); color: white; border: none; padding: 5px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        
        input, select { padding: 8px; border-radius: 6px; border: 1px solid #444; background: #2d2d2d; color: white; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div id="toggle-sidebar" onclick="toggleSidebar()"> ◀ </div>
        <div class="sidebar-header">FORTUNAS DO BRASIL</div>
        <div id="stats-box">
            <small>Patrimônio Exibido</small><br>
            <strong id="total-money" style="font-size: 1.3em; color: var(--accent);">R$ 0 Bi</strong>
        </div>
        <div id="ranking-list"></div>
    </div>
    
    <div id="resizer"></div>

    <div id="main-content">
        <div id="header">
            <input type="text" id="search" placeholder="🔍 Pesquisar por nome..." onkeyup="processar()">
            <select id="filterUf" onchange="processar()">
                <option value="">🌎 Todos os Estados</option>
                <option value="SP">São Paulo</option>
                <option value="RJ">Rio de Janeiro</option>
                <option value="GO">Goiás</option>
                <option value="RS">Rio Grande do Sul</option>
                <option value="SC">Santa Catarina</option>
                <option value="CE">Ceará</option>
                <option value="MA">Maranhão</option>
                <option value="Estrangeiro">Estrangeiros</option>
            </select>
        </div>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const map = L.map('map').setView([-15, -50], 4);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        function toggleSidebar() {
            const btn = document.getElementById('toggle-sidebar');
            sidebar.classList.toggle('hidden');
            btn.innerText = sidebar.classList.contains('hidden') ? "▶" : "◀";
            setTimeout(() => { map.invalidateSize(); }, 500);
        }

            {n: "Miguel Gellert Krigsner", uf: "Estrangeiro", r: 27, usd: 4.9, o: "O Boticário", v: "Brasil", e: "Grupo Boticário", lat: -16.5, lng: -68.15, f: "https://ogimg.infoglobo.com.br/in/14420421-430-3c8/FT1086A/2014102430114.jpg"},
            {n: "Joesley Mendonça Batista", uf: "GO", r: 25, usd: 4.5, o: "JBS", v: "Brasil", e: "J&F Investimentos", lat: -15.5391, lng: -47.3323, f: "https://static.poder360.com.br/2017/05/Joesley-Batista.jpg"},
            {n: "Wesley Mendonça Batista", uf: "GO", r: 25, usd: 4.5, o: "JBS", v: "Brasil", e: "J&F Investimentos", lat: -15.5391, lng: -47.3323, f: "https://files.sunoresearch.com.br/p/uploads/2021/11/WesleyBatista.jpg"},
            {n: "Jorge Neval Moll Filho", uf: "RJ", r: 22.5, usd: 4.1, o: "Rede D'Or", v: "Brasil", e: "Rede D'Or", lat: -22.9068, lng: -43.1729, f: "https://imageio.forbes.com/specials-images/imageserve/5c6ccd99a7ea437e33f37640/0x0.jpg?format=jpg&crop=683,683,x304,y0,safe&height=416&width=416&fit=bounds"},
            {n: "Maurizio Billi", uf: "SP", r: 20.6, usd: 3.7, o: "Eurofarma", v: "Brasil", e: "Eurofarma", lat: -23.5505, lng: -46.6333, f: "https://f.i.uol.com.br/fotografia/2021/09/03/16307191496132ccad89c2e_1630719149_3x2_md.jpg"},
            {n: "Alexandre Grendene Bartelle", uf: "RS", r: 20.5, usd: 3.7, o: "Grendene", v: "Brasil", e: "Grendene", lat: -29.2238, lng: -51.3470, f: "https://veja.abril.com.br/wp-content/uploads/2016/12/alexandre-grendene.jpg?crop=1&resize=1212,909"},
            {n: "Ricardo Castellar de Faria", uf: "RJ", r: 19.6, usd: 3.5, o: "Granja Faria", v: "Brasil", e: "Granja Faria", lat: -22.9068, lng: -43.1729, f: "https://s2-oglobo.glbimg.com/FINaw1Srfmu3JcvmbNPgjoKF7UQ=/0x0:1109x1023/888x0/smart/filters:strip_icc()/i.s3.glbimg.com/v1/AUTH_da025474c0c44edd99332dddb09cabe8/internal_photos/bs/2024/o/4/baoZfNTKmtSRKit2sU0Q/ricardo-faria-granja.webp"},
            {n: "Alceu Elias Feldmann", uf: "SC", r: 18.5, usd: 3.3, o: "Fertipar", v: "Brasil", e: "Fertipar", lat: -27.2155, lng: -49.9404, f: "https://medias.revistaoeste.com/wp-content/uploads/2021/07/alceu-elias-feldmann.jpg"},
            {n: "José João Abdalla Filho", uf: "SP", r: 18.5, usd: 3.3, o: "Banco Clássico", v: "Brasil", e: "Eletrobras, Cemig", lat: -23.5505, lng: -46.6333, f: "https://muraldoparana.com.br/wp-content/uploads/2017/10/96-Jos%C3%A9-Jo%C3%A3o-Abdalla-Filho.jpg"},
            {n: "José Roberto Marinho", uf: "RJ", r: 18.5, usd: 3.3, o: "Globo", v: "Brasil", e: "Grupo Globo", lat: -22.9068, lng: -43.1729, f: "https://ogimg.infoglobo.com.br/in/25257353-408-696/FT1086A/INFOCHPDPICT000082385660.jpg"},
            {n: "João Roberto Marinho", uf: "RJ", r: 18.5, usd: 3.3, o: "Globo", v: "Brasil", e: "Grupo Globo", lat: -22.9068, lng: -43.1729, f: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTQ4Yg9GN5LfUwP0G45oVoCVVWW5PNS5rXR4A&s"},
            {n: "Roberto Irineu Marinho", uf: "RJ", r: 18.5, usd: 3.3, o: "Globo", v: "Brasil", e: "Grupo Globo", lat: -22.9068, lng: -43.1729, f: "https://p2.trrsf.com/image/fget/cf/1200/1200/middle/images.terra.com/2023/08/21/robertoirineu01-rl5llybac6r9.jpg"},
            {n: "Ermírio Pereira de Moraes", uf: "SP", r: 15, usd: 2.7, o: "Votorantim", v: "Brasil", e: "Grupo Votorantim", lat: -23.5505, lng: -46.6333, f: "https://geneall.net/images/names/pes_1072027.jpg"},
            {n: "Luís Ermírio de Moraes", uf: "SP", r: 15, usd: 2.7, o: "Votorantim", v: "Brasil", e: "Grupo Votorantim", lat: -23.5505, lng: -46.6333, f: "https://cdn-sites-assets.mziq.com/wp-content/uploads/sites/918/2022/02/luis-ermirio.jpg"},
            {n: "Maria Helena Moraes Scripilliti", uf: "SP", r: 15, usd: 2.7, o: "Votorantim", v: "Brasil", e: "Grupo Votorantim", lat: -23.5505, lng: -46.6333, f: "https://marciatravessoni.com.br/wp-content/uploads/2021/09/Maria-Helena-Moraes-Scripilliti.jpg"},
            {n: "Mário Araújo Alencar Araripe", uf: "CE", r: 15, usd: 2.7, o: "Casa dos Ventos", v: "Brasil", e: "Casa dos Ventos", lat: -7.2342, lng: -39.4125, f: "https://forbes.com.br/wp-content/uploads/2023/09/Mario-Araripe_GettyImages-768x512-1.jpg"},
            {n: "Lirio Albino Parisotto", uf: "RS", r: 18.2, usd: 3.2, o: "Videolar", v: "Brasil", e: "Videolar, Usiminas", lat: -28.7233, lng: -51.7042, f: "https://cdn-images.grupoahora.net.br/2017/02/2017_02_21_Divulga%C3%A7%C3%A3o_L%C3%ADrio-Parisotto_Principal-e1487990122360-733x1024-1.jpg"},
            {n: "Jayme Brasil Garfinkel", uf: "SP", r: 10, usd: 1.8, o: "Porto Seguro", v: "Brasil", e: "Porto Seguro", lat: -23.5505, lng: -46.6333, f: "https://www.acij.com.br/index/wp-content/uploads/2019/02/mercado-seguros-tema-palestra-jayme-garfinkel-acij-1024x536.jpg"}
        ];

        const camadaPins = L.layerGroup().addTo(map);
        window.cityData = {}; window.cityIndices = {}; window.cidadesMap = {};

        window.renderPopup = function(cityId) {
            const nomes = window.cityData[cityId];
            const idx = window.cityIndices[cityId];
            const p = nomes[idx];
            const total = nomes.length;

            let nav = '';
            if (total > 1) {
                nav = `<div class="carousel-nav">
                    <button class="carousel-btn" onclick="event.stopPropagation(); changeSlide('${cityId}', -1)">◀</button>
                    <span style="font-size:11px; font-weight:bold;">${idx + 1} de ${total}</span>
                    <button class="carousel-btn" onclick="event.stopPropagation(); changeSlide('${cityId}', 1)">▶</button>
                </div>`;
            }

            return `
                <div class="popup-card">
                    <img src="${p.f}" class="popup-img" onerror="this.src='https://via.placeholder.com/240x180?text=Forbes+Brasil'">
                    <div style="font-weight:bold; font-size:16px; margin-bottom:5px;">${p.n}</div>
                    <div class="popup-data">
                        <b>💰 Fortuna:</b> R$ ${p.r} Bi / US$ ${p.usd} Bi<br>
                        <b>💎 Origem:</b> ${p.o}<br>
                        <b>📍 Onde vive:</b> ${p.v}<br>
                        <b>📈 Ações/Empresas:</b> ${p.e}
                    </div>
                    ${nav}
                </div>
            `;
        };

        window.changeSlide = function(cityId, dir) {
            const total = window.cityData[cityId].length;
            let newIdx = (window.cityIndices[cityId] + dir + total) % total;
            window.cityIndices[cityId] = newIdx;
            document.getElementById('popup-' + cityId).innerHTML = window.renderPopup(cityId);
        };

        window.abrirDoRanking = function(cityId, idxList) {
            window.cityIndices[cityId] = idxList;
            const markerData = window.cidadesMap[cityId];
            map.setView([markerData.lat, markerData.lng], 12);
            markerData.marker.openPopup();
            setTimeout(() => { document.getElementById('popup-' + cityId).innerHTML = window.renderPopup(cityId); }, 100);
        };

        function processar() {
            camadaPins.clearLayers(); window.cityData = {}; window.cityIndices = {}; window.cidadesMap = {};
            const busca = document.getElementById('search').value.toLowerCase();
            const ufFiltro = document.getElementById('filterUf').value;
            const listaRanking = document.getElementById('ranking-list');
            let totalBi = 0; listaRanking.innerHTML = "";

            const filtrados = dados.filter(p => (p.uf === ufFiltro || ufFiltro === "") && p.n.toLowerCase().includes(busca)).sort((a,b) => b.r - a.r);

            let cityCounter = 0; const tempMap = {};
            filtrados.forEach(p => {
                totalBi += p.r; const coordKey = `${p.lat},${p.lng}`;
                if (!tempMap[coordKey]) {
                    const cid = 'city_' + cityCounter++;
                    tempMap[coordKey] = cid; window.cityData[cid] = []; window.cityIndices[cid] = 0;
                }
                const cityId = tempMap[coordKey];
                listaRanking.innerHTML += `<div class="ranking-item" onclick="abrirDoRanking('${cityId}', ${window.cityData[cityId].length})">
                    <span>${p.n}</span><b style="color:var(--accent)">R$ ${p.r}B</b>
                </div>`;
                window.cityData[cityId].push(p);
            });

            for (let coord in tempMap) {
                const cityId = tempMap[coord]; const p = window.cityData[cityId][0];
                const icon = new L.Icon({
                    iconUrl: `https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-${coresPins[p.uf] || 'blue'}.png`,
                    shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                    iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
                });
                const marker = L.marker([p.lat, p.lng], { icon: icon }).addTo(camadaPins);
                marker.bindPopup(`<div id="popup-${cityId}">${window.renderPopup(cityId)}</div>`, { maxWidth: 260 });
                window.cidadesMap[cityId] = { lat: p.lat, lng: p.lng, marker: marker };
            }
            document.getElementById('total-money').innerText = `R$ ${totalBi.toFixed(1)} Bi`;
        }
        processar();
    </script>
</body>
</html>
