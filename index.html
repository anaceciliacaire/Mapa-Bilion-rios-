<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Bilionários Brasil - Dashboard Completo</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --bg-dark: #1a1a1a; --bg-sidebar: #222; --accent: #2ecc71; --text: white; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg-dark); color: var(--text); overflow: hidden; }
        
        /* Sidebar com Animação */
        #sidebar { min-width: 330px; width: 330px; background: var(--bg-sidebar); display: flex; flex-direction: column; z-index: 1002; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); position: relative; }
        #sidebar.hidden { margin-left: -330px; min-width: 0; }

        /* Botão de Seta para Recolher */
        #toggle-sidebar { position: absolute; right: -30px; top: 20px; width: 30px; height: 60px; background: var(--accent); color: #000; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 0 8px 8px 0; font-weight: bold; z-index: 2000; box-shadow: 2px 0 5px rgba(0,0,0,0.3); font-size: 18px; }
        
        .sidebar-header { padding: 20px; background: #111; text-align: center; font-weight: bold; color: var(--accent); border-bottom: 1px solid #333; }
        #stats-box { padding: 15px; background: #2d2d2d; margin: 10px; border-radius: 8px; text-align: center; border-left: 5px solid var(--accent); }
        #ranking-list { flex-grow: 1; overflow-y: auto; padding: 5px; }
        .ranking-item { padding: 12px 15px; border-bottom: 1px solid #333; font-size: 13px; display: flex; justify-content: space-between; cursor: pointer; }
        .ranking-item:hover { background: #333; }

        #main-content { flex-grow: 1; display: flex; flex-direction: column; position: relative; }
        #header { padding: 12px 20px; background: #111; display: flex; gap: 15px; border-bottom: 1px solid #333; align-items: center; flex-wrap: wrap; }
        #map { flex-grow: 1; z-index: 1; }

        #theme-toggle { position: absolute; top: 20px; right: 20px; z-index: 1000; background: white; color: black; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        
        input, select { padding: 8px; border-radius: 6px; border: 1px solid #444; background: #2d2d2d; color: white; }
        .popup-card { color: #222; min-width: 200px; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div id="toggle-sidebar" onclick="toggleSidebar()"> ◀ </div>
        <div class="sidebar-header">TOP BILIONÁRIOS BRASIL</div>
        <div id="stats-box">
            <small>Fortuna Total Visível</small><br>
            <strong id="total-money" style="font-size: 1.3em;">R$ 0 Bi</strong>
        </div>
        <div id="ranking-list"></div>
    </div>

    <div id="main-content">
        <button id="theme-toggle" onclick="toggleTheme()">🌓 Alternar Mapa</button>
        <div id="header">
            <input type="text" id="search" placeholder="🔍 Buscar nome..." onkeyup="processar()">
            <select id="filterUf" onchange="processar()">
                <option value="">🌎 Todas as Origens</option>
                <option value="SP">São Paulo</option>
                <option value="RJ">Rio de Janeiro</option>
                <option value="GO">Goiás</option>
                <option value="RS">Rio Grande do Sul</option>
                <option value="SC">Santa Catarina</option>
                <option value="Estrangeiro">Estrangeiros</option>
            </select>
            <div style="font-size: 12px; display: flex; align-items: center; gap: 8px;">
                Min: R$<span id="valMin">0</span>B 
                <input type="range" id="minFortune" min="0" max="230" value="0" oninput="processar()">
            </div>
        </div>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const map = L.map('map').setView([-15, -50], 4);
        const darkTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        const lightTiles = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
        let currentTheme = 'dark';

        function toggleTheme() {
            if (currentTheme === 'dark') { map.removeLayer(darkTiles); lightTiles.addTo(map); currentTheme = 'light'; }
            else { map.removeLayer(lightTiles); darkTiles.addTo(map); currentTheme = 'dark'; }
        }

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            const btn = document.getElementById('toggle-sidebar');
            sb.classList.toggle('hidden');
            btn.innerText = sb.classList.contains('hidden') ? "▶" : "◀";
            setTimeout(() => { map.invalidateSize(); }, 500);
        }

        const coresPins = { 'SP': 'green', 'RJ': 'red', 'GO': 'gold', 'RS': 'orange', 'SC': 'violet', 'Estrangeiro': 'blue' };

        // LISTA COMPLETA RESTAURADA
        const dados = [
            {n: "Eduardo Luiz Saverin", uf: "SP", r: 227, lat: -23.5505, lng: -46.6333, f: "https://neofeed.com.br/wp-content/uploads/2020/07/saverin.jpg", e: "Meta"},
            {n: "Vicky Safra", uf: "Estrangeiro", r: 120.5, lat: 37.9838, lng: 23.7275, f: "https://s2-g1.glbimg.com/6Wi_2Rfs0gTgTbNYiQRnuB-Q0ZA=/0x141:742x1274/984x0/smart/filters:strip_icc()/i.s3.glbimg.com/v1/AUTH_59edd422c0c84a879bd37670ae4f538a/internal_photos/bs/2020/d/N/wZCHgSTYKwCeJZhUgcbQ/10449036.152501-1-.jpg", e: "Banco Safra"},
            {n: "Jorge Paulo Lemann", uf: "RJ", r: 88, lat: -22.9068, lng: -43.1729, f: "https://s3.us-east-005.backblazeb2.com/glamurama01/2015/08/JorgePL.jpg", e: "3G Capital"},
            {n: "André Santos Esteves", uf: "RJ", r: 51, lat: -22.9150, lng: -43.1800, f: "https://upload.wikimedia.org/wikipedia/commons/thumb/7/70/Andre_Esteves.jpg/960px-Andre_Esteves.jpg", e: "BTG Pactual"},
            {n: "Marcel Telles", uf: "RJ", r: 32, lat: -22.9250, lng: -43.1900, f: "https://medias.revistaoeste.com/wp-content/uploads/2022/04/marcel-herrmann-telles-que-e-vida-carreira-e-reestruturacao-da-brahma-5-jpg.webp", e: "3G Capital"},
            {n: "Joesley Batista", uf: "GO", r: 25, lat: -15.5391, lng: -47.3323, f: "https://static.poder360.com.br/2017/05/Joesley-Batista.jpg", e: "J&F"},
            {n: "Wesley Batista", uf: "GO", r: 25, lat: -15.5500, lng: -47.3400, f: "https://files.sunoresearch.com.br/p/uploads/2021/11/WesleyBatista.jpg", e: "J&F"},
            {n: "Alexandre Grendene", uf: "RS", r: 20.5, lat: -29.2238, lng: -51.3470, f: "https://veja.abril.com.br/wp-content/uploads/2016/12/alexandre-grendene.jpg", e: "Grendene"},
            {n: "Alceu Elias Feldmann", uf: "SC", r: 18.5, lat: -27.2155, lng: -49.9404, f: "https://medias.revistaoeste.com/wp-content/uploads/2021/07/alceu-elias-feldmann.jpg", e: "Fertipar"},
            {n: "Lirio Parisotto", uf: "RS", r: 18.2, lat: -28.7233, lng: -51.7042, f: "https://cdn-images.grupoahora.net.br/2017/02/2017_02_21_Divulga%C3%A7%C3%A3o_L%C3%ADrio-Parisotto_Principal-e1487990122360-733x1024-1.jpg", e: "Videolar"},
            {n: "Miguel Krigsner", uf: "Estrangeiro", r: 27, lat: -16.5, lng: -68.15, f: "https://ogimg.infoglobo.com.br/in/14420421-430-3c8/FT1086A/2014102430114.jpg", e: "O Boticário"}
        ];

        const camadaPins = L.layerGroup().addTo(map);

        function processar() {
            camadaPins.clearLayers();
            const busca = document.getElementById('search').value.toLowerCase();
            const ufFiltro = document.getElementById('filterUf').value;
            const minR = parseFloat(document.getElementById('minFortune').value);
            const listaRanking = document.getElementById('ranking-list');
            document.getElementById('valMin').innerText = minR;
            
            let totalBi = 0;
            listaRanking.innerHTML = "";

            dados.filter(p => {
                const bUf = (p.uf === ufFiltro || ufFiltro === "");
                return p.n.toLowerCase().includes(busca) && bUf && p.r >= minR;
            }).sort((a, b) => b.r - a.r).forEach(p => {
                totalBi += p.r;
                const corPin = coresPins[p.uf] || 'blue';
                const icon = new L.Icon({
                    iconUrl: `https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-${corPin}.png`,
                    shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                    iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
                });

                const marker = L.marker([p.lat, p.lng], { icon: icon }).addTo(camadaPins);
                marker.bindPopup(`<div class="popup-card"><img src="${p.f}" style="width:100%; height:120px; object-fit:cover; border-radius:4px;"><br><b>${p.n}</b><br>R$ ${p.r} Bi</div>`);
                listaRanking.innerHTML += `<div class="ranking-item" onclick="map.setView([${p.lat}, ${p.lng}], 12)"><span>${p.n}</span><b>R$ ${p.r}B</b></div>`;
            });
            document.getElementById('total-money').innerText = `R$ ${totalBi.toFixed(1)} Bi`;
        }
        processar();
    </script>
</body>
</html>
