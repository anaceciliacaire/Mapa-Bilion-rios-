<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Pro - Fortunas do Brasil</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --bg-dark: #141414; --bg-sidebar: #1c1c1c; --bg-card: #262626;
            --accent: #c5a059; --text-main: #ffffff; --text-muted: #aaaaaa; --border-color: #333333;
        }
        
        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg-dark); color: var(--text-main); overflow: hidden; }
        
        /* Sidebars */
        .sidebar { min-width: 330px; width: 330px; background: var(--bg-sidebar); display: flex; flex-direction: column; height: 100vh; z-index: 1002; transition: 0.4s ease; border: 1px solid var(--border-color); position: relative; }
        #sidebar-left.hidden { margin-left: -330px; }

        /* ABA DIREITA - PÁGINA INTEIRA QUANDO ABERTA */
        #sidebar-right { position: fixed; top: 0; right: 0; width: 100vw; height: 100vh; z-index: 2001; background: var(--bg-dark); border-left: none; overflow-y: auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(40%, 1fr)); gap: 30px; align-content: start; padding: 40px; }
        #sidebar-right.hidden { right: -100vw; display: none; }

        /* NOVO: Setas Toggles Fixed no Meio da Tela */
        .toggle-btn { position: fixed; top: 50%; width: 28px; height: 60px; transform: translateY(-50%); background: var(--accent); color: #000; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; z-index: 2000; box-shadow: 0 0 10px rgba(0,0,0,0.5); border-radius: 8px; transition: 0.2s; }
        .toggle-btn i { font-style: normal; font-size: 16px; margin-top: -2px; }
        #toggle-left { left: 0; border-radius: 0 8px 8px 0; }
        #toggle-right { right: 0; border-radius: 8px 0 0 8px; }

        .sidebar-header { padding: 25px 20px 15px; text-align: center; border-bottom: 1px solid var(--border-color); }
        .sidebar-title { font-size: 1.2em; font-weight: 700; color: var(--accent); letter-spacing: 0.5px; margin-bottom: 15px; }
        
        #db-selector { width: 100%; padding: 10px; border-radius: 8px; background: #0b0c10; color: #fff; border: 1px solid var(--border-color); font-size: 13px; outline: none; cursor: pointer; }

        #stats-box { padding: 15px; background: var(--bg-card); margin: 10px; border-radius: 12px; text-align: center; border: 1px solid var(--border-color); }
        
        #ranking-list { flex: 1; overflow-y: auto; padding: 5px 10px; }
        .ranking-item { padding: 12px; border-radius: 8px; margin-bottom: 5px; font-size: 13px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; }
        .ranking-item:hover { background: var(--bg-card); }
        .ranking-name { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
        
        /* Badge Sóbria */
        .badge { padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; background: rgba(255,255,255,0.1); color: #ccc; }

        /* Mapa e Área Central */
        #main-content { flex-grow: 1; display: flex; flex-direction: column; position: relative; margin: 0; transition: 0.4s ease; }
        #map { flex-grow: 1; z-index: 1; background: #0b0c10; }
        
        /* Busca Superior Centrada */
        #search-container { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); width: 300px; z-index: 1001; }
        input { width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-sidebar); color: white; outline: none; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }

        /* Gráficos na Página Direita (Analysis Mode) */
        .chart-container { padding: 0; border-bottom: none; }
        .chart-title { font-size: 13px; font-weight: 700; color: var(--accent); text-transform: uppercase; margin-bottom: 15px; display: block; }
        canvas { width: 100% !important; height: auto !important; max-height: 400px; }

        /* Visual da Sóbrio */
        #theme-toggle { position: fixed; top: 20px; right: 60px; z-index: 1000; background: var(--bg-card); color: var(--text-main); border: 1px solid var(--border-color); padding: 10px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 13px; }

        /* Popup Técnico Limpo */
        .popup-card { min-width: 250px; font-family: 'Inter', sans-serif; }
        .popup-img { width: 100%; height: 160px; object-fit: cover; object-position: top center; border-radius: 8px; margin-bottom: 10px; }
        .popup-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .popup-name { font-weight: 700; font-size: 16px; color: white; }
        .popup-data { font-size: 12px; line-height: 1.7; color: var(--text-muted); }
        .popup-data b { color: var(--text-main); font-weight: 600; }

        .legend { padding: 10px; background: rgba(24, 26, 32, 0.95); color: white; border-radius: 8px; font-size: 11px; border: 1px solid var(--border-color); box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .legend i { width: 10px; height: 10px; float: left; margin-right: 5px; border-radius: 50%; margin-top: 2px; }
    </style>
</head>
<body>

    <div id="toggle-left" class="toggle-btn" onclick="toggleSidebar('left')"> <i>▶</i> </div>
    <div id="toggle-right" class="toggle-btn" onclick="toggleSidebar('right')"> <i>◀</i> </div>

    <div id="sidebar-left" class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-title">FORTUNAS DO BRASIL</div>
            <select id="db-selector" onchange="mudarDB()">
                <option value="brasil">🇧🇷 Versão: Top 30 Brasil</option>
                <option value="mundo">🌍 Versão: Top 50 Mundo (Abreviada)</option>
            </select>
        </div>
        <div id="stats-box">
            <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 5px;">Patrimônio Acumulado</div>
            <strong id="total-money" style="font-size: 1.5em; color: var(--accent); font-weight: 700;">$ 0 Bi</strong>
        </div>
        <div id="ranking-list"></div>
    </div>

    <div id="main-content">
        <div id="search-container">
            <input type="text" id="search" placeholder="🔍 Buscar por nome ou empresa..." onkeyup="processar()">
        </div>
        <div id="map"></div>
    </div>

    <div id="sidebar-right" class="sidebar hidden">
        <div class="chart-container">
            <span class="chart-title">Concentração da Riqueza por Setor</span>
            <canvas id="chartSetores"></canvas>
        </div>

        <div class="chart-container">
            <span class="chart-title" id="titleLocalChart">Distribuição Geográfica de Bilionários</span>
            <canvas id="chartLocal"></canvas>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const map = L.map('map').setView([-15, -50], 4);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        // --- SISTEMA DE DADOS (TOP 30 BRASIL) ---
        const dbBrasil = [
            {n: "Eduardo Saverin", usd: 41.2, o: "Facebook", v: "Brasil", setor: "Tecnologia", e: "Meta", lat: -23.55, lng: -46.63, f: "https://neofeed.com.br/wp-content/uploads/2020/07/saverin.jpg", br: true, uf: "SP"},
            {n: "Vicky Safra", usd: 21.9, o: "Banco Safra", v: "Brasil", setor: "Finanças", e: "J. Safra", lat: -23.55, lng: -46.63, f: "https://s2-g1.glbimg.com/6Wi_2Rfs0gTgTbNYiQRnuB-Q0ZA=/0x141:742x1274/984x0/smart/filters:strip_icc()/i.s3.glbimg.com/v1/AUTH_59edd422c0c84a879bd37670ae4f538a/internal_photos/bs/2020/d/N/wZCHgSTYKwCeJZhUgcbQ/10449036.152501-1-.jpg", br: true, uf: "Estrangeiro"},
            {n: "Jorge Paulo Lemann", usd: 16.0, o: "AB InBev", v: "Brasil", setor: "Alimentos", e: "3G Capital", lat: -22.90, lng: -43.17, f: "https://s3.us-east-005.backblazeb2.com/glamurama01/2015/08/JorgePL.jpg", br: true, uf: "RJ"},
            {n: "André Esteves", usd: 9.2, o: "BTG Pactual", v: "Brasil", setor: "Finanças", e: "BTG Pactual", lat: -22.90, lng: -43.17, f: "https://upload.wikimedia.org/wikipedia/commons/thumb/7/70/Andre_Esteves.jpg/960px-Andre_Esteves.jpg", br: true, uf: "RJ"},
            {n: "Marcel Telles", usd: 5.8, o: "AB InBev", v: "Brasil", setor: "Alimentos", e: "3G Capital", lat: -22.90, lng: -43.17, f: "https://medias.revistaoeste.com/wp-content/uploads/2022/04/marcel-herrmann-telles-que-e-vida-carreira-e-reestruturacao-da-brahma-5-jpg.webp", br: true, uf: "RJ"}
        ];

        const dbMundo = [
            {n: "Elon Musk", usd: 342, o: "Tesla", v: "EUA", setor: "Tecnologia", e: "Tesla", lat: 37, lng: -95, f: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/cb/Elon_Musk_Royal_Society_crop.jpg/800px-Elon_Musk_Royal_Society_crop.jpg", br: false, uf: "EUA"},
            {n: "Mark Zuckerberg", usd: 216, o: "Facebook", v: "EUA", setor: "Tecnologia", e: "Meta", lat: 37.4, lng: -122, f: "https://upload.wikimedia.org/wikipedia/commons/1/18/Mark_Zuckerberg_F8_2019_Keynote_%2832830578717%29_%28cropped%29.jpg", br: false, uf: "EUA"},
            {n: "Jeff Bezos", usd: 215, o: "Amazon", v: "EUA", setor: "Varejo", e: "Amazon", lat: 47, lng: -122, f: "https://upload.wikimedia.org/wikipedia/commons/6/6c/Jeff_Bezos_at_Amazon_Spheres_Grand_Opening_in_Seattle_-_2018_%2839074799225%29_%28cropped%29.jpg", br: false, uf: "EUA"},
            {n: "Eduardo Saverin", usd: 34.5, o: "Facebook", v: "Brasil", setor: "Tecnologia", e: "Meta", lat: -23, lng: -46, f: "https://neofeed.com.br/wp-content/uploads/2020/07/saverin.jpg", br: true, uf: "Brasil"},
            {n: "Vicky Safra", usd: 20.7, o: "Banco Safra", v: "Brasil", setor: "Finanças", e: "J. Safra", lat: 10, lng: -60, f: "https://s2-g1.glbimg.com/6Wi_2Rfs0gTgTbNYiQRnuB-Q0ZA=/0x141:742x1274/984x0/smart/filters:strip_icc()/i.s3.glbimg.com/v1/AUTH_59edd422c0c84a879bd37670ae4f538a/internal_photos/bs/2020/d/N/wZCHgSTYKwCeJZhUgcbQ/10449036.152501-1-.jpg", br: true, uf: "Brasil"}
        ];

        let dadosAtuais = dbBrasil;
        let modo = 'brasil';
        let setorChart, localChart;
        const camadaPins = L.layerGroup().addTo(map);
        let legendControl = L.control({position: 'bottomright'});

        // --- INTERFACE FIXED ---
        function toggleSidebar(side) {
            if (side === 'right') {
                // Auto-fecha a esquerda para foco absoluto
                if (document.getElementById('sidebar-right').classList.contains('hidden')) {
                    document.getElementById('sidebar-left').classList.add('hidden');
                    document.getElementById('toggle-left').innerText = "▶";
                }
            }
            const el = document.getElementById(`sidebar-${side}`);
            const btn = document.getElementById(`toggle-${side}`);
            el.classList.toggle('hidden');
            if (side === 'left') {
                btn.innerText = el.classList.contains('hidden') ? "▶" : "◀";
            } else {
                btn.innerText = el.classList.contains('hidden') ? "◀" : "▶";
            }
            setTimeout(() => map.invalidateSize(), 400);
        }

        function mudarDB() {
            modo = document.getElementById('db-selector').value;
            dadosAtuais = (modo === 'brasil') ? dbBrasil : dbMundo;
            if (modo === 'brasil') map.setView([-15, -50], 4);
            else map.setView([20, 0], 2);
            processar();
            atualizarLegenda();
        }

        // --- PROCESSAMENTO E GRÁFICOS (MODO ANÁLISE) ---
        function processar() {
            camadaPins.clearLayers();
            const busca = document.getElementById('search').value.toLowerCase();
            const lista = document.getElementById('ranking-list');
            let total = 0; lista.innerHTML = "";
            
            const filtrados = dadosAtuais.filter(p => p.n.toLowerCase().includes(busca)).sort((a,b) => b.usd - a.usd);
            
            const setoresData = {};
            const localData = {};

            filtrados.forEach((p, i) => {
                total += p.usd;
                setoresData[p.setor] = (setoresData[p.setor] || 0) + p.usd;
                localData[p.uf] = (localData[p.uf] || 0) + 1;

                lista.innerHTML += `
                    <div class="ranking-item" onclick="focarPonto(${p.lat}, ${p.lng}, '${p.n}')">
                        <div>
                            <div class="ranking-name">${p.br ? p.n+' 🇧🇷' : p.n}</div>
                            <span class="badge" style="background:rgba(255,255,255,0.05); color:#9ba1a6; border:none;">${p.setor}</span>
                        </div>
                        <b style="color:var(--accent)">$${p.usd}B</b>
                    </div>`;

                // PINS CONSERTADOS COM FOTOS REAIS
                let icon;
                if (modo === 'brasil') {
                    const cores = {'SP':'green','RJ':'red','GO':'gold','RS':'orange','Estrangeiro':'blue'};
                    icon = new L.Icon({
                        iconUrl: `https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-${cores[p.uf] || 'grey'}.png`,
                        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                        iconSize: [25, 41], iconAnchor: [12, 41]
                    });
                } else {
                    icon = new L.Icon({
                        iconUrl: `https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-${p.br ? 'gold' : 'white'}.png`,
                        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                        iconSize: [25, 41], iconAnchor: [12, 41]
                    });
                }

                L.marker([p.lat, p.lng], {icon}).addTo(camadaPins).bindPopup(`
                    <div class="popup-card">
                        <img src="${p.f}" class="popup-img" onerror="this.src='https://via.placeholder.com/240x160'">
                        <div class="popup-header">
                            <div class="popup-name">${p.br ? p.n+' 🇧🇷' : p.n}</div>
                            <span class="badge" style="border:none;">${p.setor}</span>
                        </div>
                        <div class="popup-data">
                            <b>💰 Fortuna:</b> US$ ${p.usd} Bi ${p.r ? '/ R$ '+p.r+' Bi' : ''}<br>
                            <b>💎 Origem:</b> ${p.o}<br>
                            <b>📍 Onde vive:</b> ${p.v}
                        </div>
                    </div>
                `);
            });

            document.getElementById('total-money').innerText = `$ ${total.toFixed(1)} Bilhões`;
            atualizarGraficos(setoresData, localData);
        }

        // --- CONSERTO DA LEGENDA DINÂMICA ---
        function atualizarLegenda() {
            if (map.legendControl) map.removeControl(map.legendControl);
            legendControl.onAdd = function () {
                const div = L.DomUtil.create('div', 'legend');
                if (modo === 'brasil') {
                    div.innerHTML = '<strong>📍 Origem (UF)</strong><br>';
                    const lCores = {'SP':'#2ecc71','RJ':'#e74c3c','GO':'#f1c40f','RS':'#e67e22','Outro':'#7f8c8d'};
                    for (let k in lCores) div.innerHTML += `<i style="background:${lCores[k]}"></i> ${k}<br>`;
                } else {
                    div.innerHTML = '<strong>🌎 Classificação</strong><br>';
                    div.innerHTML += `<i style="background:#fff; border:1px solid #ccc"></i> Internacional<br>`;
                    div.innerHTML += `<i style="background:#f1c40f"></i> Brasileiros<br>`;
                }
                return div;
            };
            legendControl.addTo(map);
            map.legendControl = legendControl;
        }

        function atualizarGraficos(setores, locais) {
            const ctxSetores = document.getElementById('chartSetores').getContext('2d');
            const ctxLocal = document.getElementById('chartLocal').getContext('2d');
            if (setorChart) setorChart.destroy(); if (localChart) localChart.destroy();

            // Gráficos mais limpos e integrados ao novo visual Sóbrio
            Chart.defaults.color = '#aaaaaa';
            Chart.defaults.font.family = "'Inter', sans-serif";

            setorChart = new Chart(ctxSetores, {
                type: 'doughnut',
                data: { labels: Object.keys(setores), datasets: [{ data: Object.values(setores), backgroundColor: ['#00d26a', '#3498db', '#f1c40f', '#e74c3c', '#9b59b6', '#e67e22'], borderWidth: 0 }] },
                options: { plugins: { legend: { display: false } }, cutout: '70%' }
            });

            localChart = new Chart(ctxLocal, {
                type: 'bar',
                data: { labels: Object.keys(locais), datasets: [{ label: 'Bilionários', data: Object.values(locais), backgroundColor: '#00d26a' }] },
                options: { 
                    indexAxis: 'y',
                    scales: { x: { grid: { display: false }, ticks: { color: '#aaaaaa' } }, y: { ticks: { color: '#ffffff' } } },
                    plugins: { legend: { display: false } }
                }
            });
        }

        window.focarPonto = function(lat, lng, nome) { map.setView([lat, lng], 8); };

        processar();
        atualizarLegenda();
    </script>
</body>
</html>
