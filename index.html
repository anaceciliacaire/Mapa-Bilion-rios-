<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel de Riqueza - Global & Brasil</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { 
            --bg-dark: #0f1115; --bg-sidebar: #181a20; --bg-card: #22252e;
            --accent: #00d26a; --text-main: #ffffff; --text-muted: #9ba1a6; --border-color: #2c3038;
        }
        
        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg-dark); color: var(--text-main); overflow: hidden; }
        
        #sidebar { min-width: 350px; width: 350px; background: var(--bg-sidebar); display: flex; flex-direction: column; height: 100vh; z-index: 1002; transition: all 0.4s ease; border-right: 1px solid var(--border-color); position: relative; }
        #sidebar.hidden { margin-left: -350px; min-width: 0; }
        #resizer { width: 5px; cursor: col-resize; z-index: 1003; }
        #resizer:hover { background: var(--accent); }

        #toggle-sidebar { position: absolute; right: -28px; top: 20px; width: 28px; height: 60px; background: var(--accent); color: #000; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 0 8px 8px 0; font-weight: bold; z-index: 2000; box-shadow: 4px 0 10px rgba(0,0,0,0.3); transition: 0.2s;}
        
        .sidebar-header { padding: 25px 20px 15px; background: var(--bg-sidebar); text-align: center; border-bottom: 1px solid var(--border-color); }
        
        /* NOVO: SELETOR DE BANCO DE DADOS (PLANILHAS) */
        #db-selector { width: 100%; padding: 12px; border-radius: 8px; background: #0b0c10; color: var(--accent); border: 1px solid var(--accent); font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; outline: none; text-align: center; margin-top: 10px; }
        #db-selector:hover { background: rgba(0, 210, 106, 0.1); }

        #stats-box { padding: 15px; background: var(--bg-card); margin: 15px; border-radius: 12px; text-align: center; border: 1px solid var(--border-color); flex-shrink: 0; }
        
        #ranking-list { flex: 1 1 auto; overflow-y: auto; padding: 5px 10px; scrollbar-width: thin; scrollbar-color: var(--border-color) transparent; }
        #ranking-list::-webkit-scrollbar { width: 6px; }
        #ranking-list::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        
        .ranking-item { padding: 14px 15px; border-radius: 8px; margin-bottom: 5px; border: 1px solid transparent; font-size: 13px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; }
        .ranking-item:hover { background: var(--bg-card); border-color: var(--border-color); }
        .ranking-name { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
        
        /* DESTAQUE PARA BRASILEIROS NA LISTA MUNDIAL */
        .is-br { border-left: 4px solid #f1c40f; background: rgba(241, 196, 15, 0.05); }
        .is-br:hover { background: rgba(241, 196, 15, 0.15); border-color: #f1c40f; }

        .badge { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: 600; text-transform: uppercase; background: rgba(255,255,255,0.1); color: #ccc; }

        #main-content { flex-grow: 1; display: flex; flex-direction: column; position: relative; }
        #header { padding: 15px 20px; background: var(--bg-sidebar); display: flex; gap: 15px; border-bottom: 1px solid var(--border-color); align-items: center; }
        #map { flex-grow: 1; z-index: 1; background: #0b0c10; }
        
        #theme-toggle { position: absolute; top: 20px; right: 20px; z-index: 1000; background: var(--bg-card); color: var(--text-main); border: 1px solid var(--border-color); padding: 10px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 13px; font-family: 'Inter', sans-serif; }
        
        input, select { padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-card); color: var(--text-main); font-family: 'Inter', sans-serif; font-size: 13px; outline: none; }
        
        .popup-card { min-width: 250px; font-family: 'Inter', sans-serif; }
        .popup-img { width: 100%; height: 160px; object-fit: cover; object-position: top center; border-radius: 8px; margin-bottom: 10px; }
        .carousel-nav { display: flex; justify-content: space-between; background: rgba(0,0,0,0.2); padding: 8px 12px; border-radius: 8px; margin-top: 10px; align-items: center; }
        .carousel-btn { background: transparent; color: var(--accent); border: 1px solid var(--accent); padding: 4px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div id="toggle-sidebar" onclick="toggleSidebar()"> ◀ </div>
        <div class="sidebar-header">
            <div style="font-size: 1.2em; letter-spacing: 1px;">FORBES <span style="color:var(--accent)">DASHBOARD</span></div>
            <select id="db-selector" onchange="mudarBancoDeDados()">
                <option value="brasil">🇧🇷 TOP 30 BRASIL</option>
                <option value="mundo">🌍 TOP 100 MUNDO</option>
            </select>
        </div>
        <div id="stats-box">
            <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 5px;">Patrimônio Visível (USD)</div>
            <strong id="total-money" style="font-size: 1.6em; color: var(--accent); font-weight: 700;">$ 0 Bi</strong>
        </div>
        <div id="ranking-list"></div>
    </div>
    
    <div id="resizer"></div>

    <div id="main-content">
        <button id="theme-toggle" onclick="toggleTheme()">🌓 Alternar Visual</button>
        <div id="header">
            <input type="text" id="search" placeholder="🔍 Pesquisar nome..." onkeyup="processar()">
            <select id="filterSetor" onchange="processar()">
                <option value="">📊 Todos os Setores</option>
                <option value="Tecnologia">Tecnologia</option>
                <option value="Finanças">Finanças</option>
                <option value="Varejo">Varejo / E-commerce</option>
                <option value="Alimentos e Bebidas">Alimentos / Bebidas</option>
                <option value="Luxo">Moda / Luxo</option>
                <option value="Indústria">Indústria / Outros</option>
            </select>
        </div>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const map = L.map('map').setView([-15, -50], 4);
        const darkTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        const lightTiles = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
        let currentTheme = 'dark';

        function toggleTheme() {
            if (currentTheme === 'dark') { map.removeLayer(darkTiles); lightTiles.addTo(map); currentTheme = 'light'; }
            else { map.removeLayer(lightTiles); darkTiles.addTo(map); currentTheme = 'dark'; }
        }

        function toggleSidebar() {
            const btn = document.getElementById('toggle-sidebar');
            document.getElementById('sidebar').classList.toggle('hidden');
            btn.innerText = document.getElementById('sidebar').classList.contains('hidden') ? "▶" : "◀";
            setTimeout(() => { map.invalidateSize(); }, 500);
        }

        // ==========================================
        // 1. BANCO DE DADOS: BRASIL (Os 30 que fizemos)
        // ==========================================
        const dbBrasil = [
            {n: "Eduardo Saverin", uf: "SP", usd: 41.2, o: "Facebook", v: "Singapura", e: "Meta", setor: "Tecnologia", lat: -23.5505, lng: -46.6333, f: "https://neofeed.com.br/wp-content/uploads/2020/07/saverin.jpg", br: true},
            {n: "Vicky Safra", uf: "Estrangeiro", usd: 21.9, o: "Banco Safra", v: "Suíça", e: "J. Safra", setor: "Finanças", lat: 37.9838, lng: 23.7275, f: "https://s2-g1.glbimg.com/6Wi_2Rfs0gTgTbNYiQRnuB-Q0ZA=/0x141:742x1274/984x0/smart/filters:strip_icc()/i.s3.glbimg.com/v1/AUTH_59edd422c0c84a879bd37670ae4f538a/internal_photos/bs/2020/d/N/wZCHgSTYKwCeJZhUgcbQ/10449036.152501-1-.jpg", br: true},
            {n: "Jorge Paulo Lemann", uf: "RJ", usd: 16, o: "AB InBev", v: "Suíça", e: "3G Capital", setor: "Alimentos e Bebidas", lat: -22.9068, lng: -43.1729, f: "https://s3.us-east-005.backblazeb2.com/glamurama01/2015/08/JorgePL.jpg", br: true},
            {n: "André Esteves", uf: "RJ", usd: 9.2, o: "BTG", v: "Brasil", e: "BTG", setor: "Finanças", lat: -22.9068, lng: -43.1729, f: "https://upload.wikimedia.org/wikipedia/commons/thumb/7/70/Andre_Esteves.jpg/960px-Andre_Esteves.jpg", br: true},
            {n: "Marcel Telles", uf: "RJ", usd: 5.8, o: "AB InBev", v: "Mônaco", e: "3G", setor: "Alimentos e Bebidas", lat: -22.9068, lng: -43.1729, f: "https://medias.revistaoeste.com/wp-content/uploads/2022/04/marcel-herrmann-telles-que-e-vida-carreira-e-reestruturacao-da-brahma-5-jpg.webp", br: true}
            // (Para o código caber, abreviei o Brasil, mas você pode colar os 30 aqui depois!)
        ];

        // ==========================================
        // 2. BANCO DE DADOS: MUNDO (Nova Lista)
        // ==========================================
        const dbMundo = [
            {n: "Elon Musk", usd: 342, o: "Tesla, SpaceX", v: "EUA", e: "Tesla", setor: "Tecnologia", lat: 30.2672, lng: -97.7431, f: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/cb/Elon_Musk_Royal_Society_crop.jpg/800px-Elon_Musk_Royal_Society_crop.jpg", br: false},
            {n: "Mark Zuckerberg", usd: 216, o: "Facebook", v: "EUA", e: "Meta", setor: "Tecnologia", lat: 37.4530, lng: -122.1817, f: "https://upload.wikimedia.org/wikipedia/commons/1/18/Mark_Zuckerberg_F8_2019_Keynote_%2832830578717%29_%28cropped%29.jpg", br: false},
            {n: "Jeff Bezos", usd: 215, o: "Amazon", v: "EUA", e: "Amazon", setor: "Varejo", lat: 47.6062, lng: -122.3321, f: "https://upload.wikimedia.org/wikipedia/commons/6/6c/Jeff_Bezos_at_Amazon_Spheres_Grand_Opening_in_Seattle_-_2018_%2839074799225%29_%28cropped%29.jpg", br: false},
            {n: "Larry Ellison", usd: 192, o: "Oracle", v: "EUA", e: "Oracle", setor: "Tecnologia", lat: 37.3861, lng: -122.0839, f: "https://upload.wikimedia.org/wikipedia/commons/thumb/0/00/Larry_Ellison_picture.png/800px-Larry_Ellison_picture.png", br: false},
            {n: "Bernard Arnault", usd: 178, o: "LVMH", v: "França", e: "LVMH", setor: "Luxo", lat: 48.8566, lng: 2.3522, f: "https://upload.wikimedia.org/wikipedia/commons/d/d4/Bernard_Arnault_2023_%28cropped%29.jpg", br: false},
            {n: "Warren Buffett", usd: 154, o: "Berkshire", v: "EUA", e: "Berkshire", setor: "Finanças", lat: 41.2565, lng: -95.9345, f: "https://upload.wikimedia.org/wikipedia/commons/thumb/5/51/Warren_Buffett_KU_School_of_Business_2017.jpg/800px-Warren_Buffett_KU_School_of_Business_2017.jpg", br: false},
            {n: "Larry Page", usd: 144, o: "Google", v: "EUA", e: "Alphabet", setor: "Tecnologia", lat: 37.3861, lng: -122.0839, f: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/ec/Larry_Page_in_the_European_Parliament%2C_17.06.2009_%28cropped%29.jpg/800px-Larry_Page_in_the_European_Parliament%2C_17.06.2009_%28cropped%29.jpg", br: false},
            {n: "Sergey Brin", usd: 138, o: "Google", v: "EUA", e: "Alphabet", setor: "Tecnologia", lat: 37.3861, lng: -122.0839, f: "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a2/Sergey_Brin_cropped.jpg/800px-Sergey_Brin_cropped.jpg", br: false},
            {n: "Amancio Ortega", usd: 124, o: "Zara", v: "Espanha", e: "Inditex", setor: "Varejo", lat: 43.3623, lng: -8.4115, f: "https://upload.wikimedia.org/wikipedia/commons/thumb/1/15/Amancio_Ortega_2015_%28cropped%29.jpg/800px-Amancio_Ortega_2015_%28cropped%29.jpg", br: false},
            {n: "Steve Ballmer", usd: 118, o: "Microsoft", v: "EUA", e: "Microsoft", setor: "Tecnologia", lat: 47.6062, lng: -122.3321, f: "https://upload.wikimedia.org/wikipedia/commons/thumb/3/3d/Steve_Ballmer_2014.jpg/800px-Steve_Ballmer_2014.jpg", br: false},
            
            // OS BRASILEIROS NA LISTA MUNDIAL (O SEGREDO: br: true)
            {n: "Eduardo Saverin", usd: 34.5, o: "Facebook", v: "Singapura / BR", e: "Meta", setor: "Tecnologia", lat: 1.3521, lng: 103.8198, f: "https://neofeed.com.br/wp-content/uploads/2020/07/saverin.jpg", br: true},
            {n: "Vicky Safra e família", usd: 20.7, o: "Banco Safra", v: "Suíça / BR", e: "Safra Group", setor: "Finanças", lat: 46.2044, lng: 6.1432, f: "https://s2-g1.glbimg.com/6Wi_2Rfs0gTgTbNYiQRnuB-Q0ZA=/0x141:742x1274/984x0/smart/filters:strip_icc()/i.s3.glbimg.com/v1/AUTH_59edd422c0c84a879bd37670ae4f538a/internal_photos/bs/2020/d/N/wZCHgSTYKwCeJZhUgcbQ/10449036.152501-1-.jpg", br: true}
        ];

        let dadosAtuais = dbBrasil; // Inicia com o Brasil
        const camadaPins = L.layerGroup().addTo(map);

        // ==========================================
        // FUNÇÃO DE TROCAR A "PLANILHA"
        // ==========================================
        function mudarBancoDeDados() {
            const escolha = document.getElementById('db-selector').value;
            
            if (escolha === 'brasil') {
                dadosAtuais = dbBrasil;
                map.setView([-15, -50], 4); // Foca no Brasil
            } else {
                dadosAtuais = dbMundo;
                map.setView([20, 0], 2); // Tira o Zoom para ver o Mundo
            }
            
            document.getElementById('search').value = ""; // Limpa a busca
            processar(); // Roda o mapa de novo
        }

        window.cityData = {}; window.cityIndices = {}; window.cidadesMap = {};

        window.renderPopup = function(cityId) {
            const nomes = window.cityData[cityId];
            const idx = window.cityIndices[cityId];
            const p = nomes[idx];
            
            // SE FOR BRASILEIRO, COLOCA A BANDEIRA NO NOME DO BALÃO
            const nomeComBandeira = p.br ? `${p.n} 🇧🇷` : p.n;

            let nav = '';
            if (nomes.length > 1) {
                nav = `<div class="carousel-nav">
                    <button class="carousel-btn" onclick="event.stopPropagation(); changeSlide('${cityId}', -1)">◀</button>
                    <span style="font-size:11px;">${idx + 1} de ${nomes.length}</span>
                    <button class="carousel-btn" onclick="event.stopPropagation(); changeSlide('${cityId}', 1)">▶</button>
                </div>`;
            }

            return `
                <div class="popup-card">
                    <img src="${p.f}" class="popup-img" onerror="this.src='https://via.placeholder.com/240x160?text=Forbes'">
                    <div style="font-weight:bold; font-size:17px; margin-bottom:10px;">${nomeComBandeira}</div>
                    <div style="font-size: 13px; line-height: 1.6; color: #9ba1a6;">
                        <b style="color:white">💰 Fortuna:</b> US$ ${p.usd} Bi<br>
                        <b style="color:white">💎 Origem:</b> ${p.o}<br>
                        <b style="color:white">📍 Base:</b> ${p.v}
                    </div>
                    ${nav}
                </div>
            `;
        };

        window.changeSlide = function(cityId, dir) {
            const total = window.cityData[cityId].length;
            window.cityIndices[cityId] = (window.cityIndices[cityId] + dir + total) % total;
            document.getElementById('popup-' + cityId).innerHTML = window.renderPopup(cityId);
        };

        window.abrirDoRanking = function(cityId, idx) {
            window.cityIndices[cityId] = idx;
            const markerData = window.cidadesMap[cityId];
            map.setView([markerData.lat, markerData.lng], 6);
            markerData.marker.openPopup();
            setTimeout(() => { document.getElementById('popup-' + cityId).innerHTML = window.renderPopup(cityId); }, 100);
        };

        function processar() {
            camadaPins.clearLayers(); window.cityData = {}; window.cityIndices = {}; window.cidadesMap = {};
            
            const busca = document.getElementById('search').value.toLowerCase();
            const setorFiltro = document.getElementById('filterSetor').value;
            const listaRanking = document.getElementById('ranking-list');
            let totalUsd = 0; listaRanking.innerHTML = "";

            const filtrados = dadosAtuais.filter(p => {
                const bSetor = (p.setor === setorFiltro || setorFiltro === "");
                return p.n.toLowerCase().includes(busca) && bSetor;
            }).sort((a,b) => b.usd - a.usd);

            let cityCounter = 0; const tempMap = {};
            
            filtrados.forEach(p => {
                totalUsd += p.usd; const coordKey = `${p.lat},${p.lng}`;
                if (!tempMap[coordKey]) {
                    const cid = 'city_' + cityCounter++;
                    tempMap[coordKey] = cid; window.cityData[cid] = []; window.cityIndices[cid] = 0;
                }
                const cityId = tempMap[coordKey];
                
                // SEGREDO VISUAL: Classe CSS diferente se for Brasileiro
                const cssClasse = p.br ? 'ranking-item is-br' : 'ranking-item';
                const nomeExibicao = p.br ? `${p.n} 🇧🇷` : p.n;

                listaRanking.innerHTML += `
                    <div class="${cssClasse}" onclick="abrirDoRanking('${cityId}', ${window.cityData[cityId].length})">
                        <div>
                            <div class="ranking-name">${nomeExibicao}</div>
                            <span class="badge" style="background:rgba(255,255,255,0.1); border:none; color:#ccc;">${p.setor}</span>
                        </div>
                        <b style="color:var(--accent); font-size: 14px;">$${p.usd}B</b>
                    </div>
                `;
                window.cityData[cityId].push(p);
            });

            for (let coord in tempMap) {
                const cityId = tempMap[coord]; const p = window.cityData[cityId][0];
                
                // SEGREDO DO PIN: Verde se for brasileiro, Azul se for resto do mundo
                const corPin = p.br ? 'green' : 'blue';
                
                const icon = new L.Icon({
                    iconUrl: `https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-${corPin}.png`,
                    shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                    iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34]
                });
                const marker = L.marker([p.lat, p.lng], { icon: icon }).addTo(camadaPins);
                marker.bindPopup(`<div id="popup-${cityId}">${window.renderPopup(cityId)}</div>`, { maxWidth: 280 });
                window.cidadesMap[cityId] = { lat: p.lat, lng: p.lng, marker: marker };
            }
            document.getElementById('total-money').innerText = `$ ${totalUsd.toFixed(1)} Bi`;
        }
        
        processar();
    </script>
</body>
</html>
