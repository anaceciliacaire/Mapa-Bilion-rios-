<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Bilionários Brasil - Dashboard Final</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: #1a1a1a; color: white; overflow: hidden; }
        #sidebar { width: 330px; background: #222; display: flex; flex-direction: column; border-right: 1px solid #333; z-index: 10; }
        .sidebar-header { padding: 20px; background: #111; text-align: center; font-weight: bold; color: #2ecc71; border-bottom: 1px solid #333; }
        #stats-box { padding: 15px; background: #2d2d2d; margin: 10px; border-radius: 8px; text-align: center; border-left: 5px solid #2ecc71; }
        #ranking-list { flex-grow: 1; overflow-y: auto; padding: 5px; }
        .ranking-item { padding: 12px 15px; border-bottom: 1px solid #333; font-size: 13px; display: flex; justify-content: space-between; cursor: pointer; }
        .ranking-item:hover { background: #333; }
        #main-content { flex-grow: 1; display: flex; flex-direction: column; }
        #header { padding: 12px 20px; background: #1a1a1a; display: flex; gap: 15px; border-bottom: 1px solid #333; }
        #map { flex-grow: 1; }
        input, select { padding: 8px; border-radius: 6px; border: 1px solid #444; background: #2d2d2d; color: white; }
        .popup-card { color: #222; min-width: 240px; }
        .popup-img { width: 100%; height: 150px; object-fit: cover; border-radius: 6px; margin-bottom: 8px; background: #eee; }
        .legend { padding: 10px; background: rgba(0,0,0,0.9); color: white; border-radius: 8px; font-size: 12px; }
        .legend i { width: 12px; height: 12px; float: left; margin-right: 10px; border-radius: 50%; margin-top: 4px; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="sidebar-header">TOP BILIONÁRIOS BRASIL</div>
        <div id="stats-box">
            <small>Fortuna Visível</small><br>
            <strong id="total-money" style="font-size: 1.3em;">R$ 0 Bi</strong>
        </div>
        <div id="ranking-list"></div>
    </div>

    <div id="main-content">
        <div id="header">
            <input type="text" id="search" placeholder="🔍 Buscar bilionário..." onkeyup="processar()">
            <select id="filterUf" onchange="processar()">
                <option value="">🌎 Todas as Origens</option>
                <option value="SP">São Paulo (SP)</option>
                <option value="RJ">Rio de Janeiro (RJ)</option>
                <option value="GO">Goiás (GO)</option>
                <option value="RS">Rio Grande do Sul (RS)</option>
                <option value="SC">Santa Catarina (SC)</option>
                <option value="CE">Ceará (CE)</option>
                <option value="MA">Maranhão (MA)</option>
                <option value="Estrangeiro">Nascidos fora do Brasil</option>
            </select>
        </div>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

            'SC': '#9b59b6', 'MA': '#1abc9c', 'CE': '#e91e63', 'Estrangeiro': '#3498db'

            {n: "Maurizio Billi", i: 68, c: "São Paulo", uf: "SP", nac: "Brasileira", r: 20.6, usd: 3.74, o: "Eurofarma", v: "Brasil", e: "Eurofarma", lat: -23.5900, lng: -46.6700, f: "https://f.i.uol.com.br/fotografia/2021/09/03/16307191496132ccad89c2e_1630719149_3x2_md.jpg"},
            {n: "Alexandre Grendene Bartelle", i: 75, c: "Farroupilha", uf: "RS", nac: "Brasileira", r: 20.5, usd: 3.72, o: "Grendene", v: "Brasil", e: "Grendene", lat: -29.2238, lng: -51.3470, f: "https://veja.abril.com.br/wp-content/uploads/2016/12/alexandre-grendene.jpg?crop=1&resize=1212,909"},
            {n: "Ricardo Castellar de Faria", i: 50, c: "Rio de Janeiro", uf: "RJ", nac: "Brasileira", r: 19.6, usd: 3.56, o: "Granja Faria", v: "Brasil", e: "Granja Faria", lat: -23.0000, lng: -43.2700, f: "https://s2-oglobo.glbimg.com/FINaw1Srfmu3JcvmbNPgjoKF7UQ=/0x0:1109x1023/888x0/smart/filters:strip_icc()/i.s3.glbimg.com/v1/AUTH_da025474c0c44edd99332dddb09cabe8/internal_photos/bs/2024/o/4/baoZfNTKmtSRKit2sU0Q/ricardo-faria-granja.webp"},

            {n: "José João Abdalla Filho", i: 80, c: "São Paulo", uf: "SP", nac: "Brasileira", r: 18.5, usd: 3.36, o: "Banco Clássico", v: "Brasil", e: "Eletrobras", lat: -23.6000, lng: -46.6800, f: "https://muraldoparana.com.br/wp-content/uploads/2017/10/96-Jos%C3%A9-Jo%C3%A3o-Abdalla-Filho.jpg"},

            {n: "Mário Araripe", i: 70, c: "Crato", uf: "CE", nac: "Brasileira", r: 15, usd: 2.7, o: "Casa dos Ventos", v: "Brasil", e: "Energia", lat: -7.2342, lng: -39.4125, f: "https://forbes.com.br/wp-content/uploads/2023/09/Mario-Araripe_GettyImages-768x512-1.jpg"},
            {n: "Jayme Garfinkel", i: 78, c: "São Paulo", uf: "SP", nac: "Brasileira", r: 10, usd: 1.8, o: "Porto Seguro", v: "Brasil", e: "Seguros", lat: -23.6100, lng: -46.6900, f: "https://www.acij.com.br/index/wp-content/uploads/2019/02/mercado-seguros-tema-palestra-jayme-garfinkel-acij-1024x536.jpg"}
        ];

        // AJUSTE: Cluster só aparece em zoom muito baixo
        const markers = L.markerClusterGroup({
            disableClusteringAtZoom: 8, // A partir do zoom 8 (estado), ele separa as pessoas
            spiderfyOnMaxZoom: true,
            showCoverageOnHover: false
        });

        function processar() {
            markers.clearLayers();
            const busca = document.getElementById('search').value.toLowerCase();
            const ufFiltro = document.getElementById('filterUf').value;
            const listaRanking = document.getElementById('ranking-list');
            let totalBi = 0;

            listaRanking.innerHTML = "";

            const filtrados = dados.filter(p => {
                const bUf = (p.uf === ufFiltro || ufFiltro === "");
                return p.n.toLowerCase().includes(busca) && bUf;
            }).sort((a, b) => b.r - a.r);

            filtrados.forEach(p => {
                totalBi += p.r;
                const cor = cores[p.uf] || '#7f8c8d';
                const raio = Math.sqrt(p.r) * 11000;

                const circle = L.circle([p.lat, p.lng], {
                    color: cor, weight: 2, fillColor: cor, fillOpacity: 0.5, radius: raio
                });

                circle.bindPopup(`
                    <div class="popup-card">
                        <img src="${p.f}" class="popup-img" onerror="this.src='https://via.placeholder.com/240x150?text=Forbes+Brasil'">
                        <div style="font-weight:bold; font-size:16px;">${p.n}</div>
                        <div style="font-size:11px; margin-bottom:8px; border-bottom:1px solid #ddd; padding-bottom:5px; color:#555">
                            <b>Idade:</b> ${p.i} | <b>Vive em:</b> ${p.v}
                        </div>
                        <div style="font-size:12px; line-height:1.5; color:#222">
                            <b>Nascimento:</b> ${p.c} (${p.nac})<br>
                            <b>💰 Fortuna:</b> R$ ${p.r} Bi / US$ ${p.usd} Bi<br>
                            <b>Empresas:</b> ${p.e}
                        </div>
                    </div>
                `);

                markers.addLayer(circle);

                listaRanking.innerHTML += `
                    <div class="ranking-item" onclick="map.setView([${p.lat}, ${p.lng}], 12)">
                        <span>${p.n}</span>
                        <b style="color:#2ecc71">R$ ${p.r}B</b>
                    </div>
                `;
            });

            document.getElementById('total-money').innerText = `R$ ${totalBi.toFixed(1)} Bi`;
            map.addLayer(markers);
        }

        const legend = L.control({position: 'bottomright'});
        legend.onAdd = function () {
            const div = L.DomUtil.create('div', 'legend');
            div.innerHTML = '<strong>🌎 Estados</strong><br>';
            for (let k in cores) {
                div.innerHTML += `<i style="background:${cores[k]}"></i> ${k}<br>`;
            }
            return div;
        };
        legend.addTo(map);

        processar();
    </script>
</body>
</html>
