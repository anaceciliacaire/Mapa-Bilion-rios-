<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Pro - Fortunas do Brasil</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --bg-dark: #0f1115; --bg-sidebar: #181a20; --bg-card: #22252e;
            --accent: #00d26a; --text-main: #ffffff; --text-muted: #9ba1a6; --border-color: #2c3038;
        }
        
        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg-dark); color: var(--text-main); overflow: hidden; }
        
        /* Sidebars */
        .sidebar { min-width: 320px; width: 320px; background: var(--bg-sidebar); display: flex; flex-direction: column; height: 100vh; z-index: 1002; transition: 0.4s ease; border: 1px solid var(--border-color); position: relative; }
        #sidebar-left.hidden { margin-left: -320px; }
        #sidebar-right { position: absolute; right: 0; top: 0; border-left: 1px solid var(--border-color); }
        #sidebar-right.hidden { margin-right: -320px; }

        /* Toggles */
        .toggle-btn { position: absolute; top: 20px; width: 28px; height: 60px; background: var(--accent); color: #000; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; z-index: 2000; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        #toggle-left { right: -28px; border-radius: 0 8px 8px 0; }
        #toggle-right { left: -28px; border-radius: 8px 0 0 8px; }

        .sidebar-header { padding: 20px; text-align: center; border-bottom: 1px solid var(--border-color); }
        .sidebar-title { font-size: 1.1em; font-weight: 700; color: var(--accent); margin-bottom: 10px; }
        
        #db-selector { width: 100%; padding: 10px; border-radius: 8px; background: #0b0c10; color: #fff; border: 1px solid var(--border-color); font-size: 13px; outline: none; cursor: pointer; }

        #stats-box { padding: 15px; background: var(--bg-card); margin: 10px; border-radius: 12px; text-align: center; border: 1px solid var(--border-color); }
        
        #ranking-list { flex: 1; overflow-y: auto; padding: 5px 10px; }
        .ranking-item { padding: 12px; border-radius: 8px; margin-bottom: 5px; font-size: 13px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; }
        .ranking-item:hover { background: var(--bg-card); }
        
        .badge { padding: 3px 7px; border-radius: 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; background: rgba(0, 210, 106, 0.1); color: var(--accent); }

        /* Mapa e Área Central */
        #main-content { flex-grow: 1; display: flex; flex-direction: column; position: relative; margin: 0 0px; transition: 0.4s ease; }
        #map { flex-grow: 1; z-index: 1; background: #0b0c10; }
        
        #header { padding: 12px 20px; background: var(--bg-sidebar); display: flex; gap: 10px; border-bottom: 1px solid var(--border-color); z-index: 1001; }
        input { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-card); color: white; outline: none; }

        /* Gráficos na Direita */
        .chart-container { padding: 15px; border-bottom: 1px solid var(--border-color); }
        .chart-title { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 10px; display: block; }

        /* Popup */
        .popup-card { min-width: 240px; font-family: 'Inter', sans-serif; }
        .popup-img { width: 100%; height: 150px; object-fit: cover; object-position: top center; border-radius: 8px; margin-bottom: 8px; }
        .popup-data { font-size: 12px; line-height: 1.6; color: var(--text-muted); }

        .legend { padding: 10px; background: rgba(24, 26, 32, 0.9); color: white; border-radius: 8px; font-size: 11px; border: 1px solid var(--border-color); }
        .legend i { width: 10px; height: 10px; float: left; margin-right: 5px; border-radius: 50%; margin-top: 2px; }
    </style>
</head>
<body>

    <div id="sidebar-left" class="sidebar">
        <div id="toggle-left" class="toggle-btn" onclick="toggleSidebar('left')"> ◀ </div>
        <div class="sidebar-header">
            <div class="sidebar-title">FORTUNAS DO BRASIL</div>
            <select id="db-selector" onchange="mudarDB()">
                <option value="brasil">🇧🇷 Versão: Top 30 Brasil</option>
                <option value="mundo">🌍 Versão: Top 50 Mundo</option>
            </select>
        </div>
        <div id="stats-box">
            <small style="color: var(--text-muted)">Património Visível</small><br>
            <strong id="total-money" style="font-size: 1.4em; color: var(--accent);">$ 0 Bi</strong>
        </div>
        <div id="ranking-list"></div>
    </div>

    <div id="main-content">
        <div id="header">
            <input type="text" id="search" placeholder="🔍 Pesquisar por nome ou empresa..." onkeyup="processar()">
        </div>
        <div id="map"></div>
    </div>

    <div id="sidebar-right" class="sidebar hidden">
        <div id="toggle-right" class="toggle-btn" onclick="toggleSidebar('right')"> ◀ </div>
        <div class="sidebar-header" style="color: var(--accent); font-weight: bold;">ANÁLISE DE DADOS</div>
        
        <div class="chart-container">
            <span class="chart-title">Concentração por Setor</span>
            <canvas id="chartSetores"></canvas>
        </div>

        <div class="chart-container">
            <span class="chart-title" id="titleLocalChart">Distribuição Geográfica</span>
            <canvas id="chartLocal"></canvas>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const map = L.map('map').setView([-15, -50], 4);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        // --- SISTEMA DE DADOS ---
        const dbBrasil = [
            {n: "Eduardo Saverin", usd: 34.5, r: 227, o: "Facebook", v: "Brasil", setor: "Tecnologia", e: "Meta", lat: -23.55, lng: -46.63, f: "https://neofeed.com.br/wp-content/uploads/2020/07/saverin.jpg", br: true, uf: "SP"},
            {n: "Vicky Safra", usd: 20.7, r: 120.5, o: "Banco Safra", v: "Brasil", setor: "Finanças", e: "J. Safra", lat: -23.55, lng: -46.63, f: "https://s2-g1.glbimg.com/6Wi_2Rfs0gTgTbNYiQRnuB-Q0ZA=/0x141:742x1274/984x0/smart/filters:strip_icc()/i.s3.glbimg.com/v1/AUTH_59edd422c0c84a879bd37670ae4f538a/internal_photos/bs/2020/d/N/wZCHgSTYKwCeJZhUgcbQ/10449036.152501-1-.jpg", br: true, uf: "Estrangeiro"},
            {n: "Jorge Paulo Lemann", usd: 16.0, r: 88, o: "AB InBev", v: "Brasil", setor: "Alimentos", e: "3G Capital", lat: -22.90, lng: -43.17, f: "https://s3.us-east-005.backblazeb2.com/glamurama01/2015/08/JorgePL.jpg", br: true, uf: "RJ"},
            {n: "André Esteves", usd: 9.2, r: 51, o: "BTG Pactual", v: "Brasil", setor: "Finanças", e: "BTG Pactual", lat: -22.90, lng: -43.17, f: "https://upload.wikimedia.org/wikipedia/commons/thumb/7/70/Andre_Esteves.jpg/960px-Andre_Esteves.jpg", br: true, uf: "RJ"},
            {n: "Joesley Batista", usd: 4.5, r: 25, o: "JBS", v: "Brasil", setor: "Agronegócio", e: "J&F", lat: -15.53, lng: -47.33, f: "https://static.poder360.com.br/2017/05/Joesley-Batista.jpg", br: true, uf: "GO"}
        ];

        const dbMundo = [
            {n: "Elon Musk", usd: 342, o: "Tesla", v: "EUA", setor: "Tecnologia", e: "Tesla", lat: 37, lng: -95, f: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/cb/Elon_Musk_Royal_Society_crop.jpg/800px-Elon_Musk_Royal_Society_crop.jpg", br: false, uf: "EUA"},
            {n: "Mark Zuckerberg", usd: 216, o: "Facebook", v: "EUA", setor: "Tecnologia", e: "Meta", lat: 37.4, lng: -122, f: "https://upload.wikimedia.org/wikipedia/commons/1/18/Mark_Zuckerberg_F8_2019_Keynote_%2832830578717%29_%28cropped%29.jpg", br: false, uf: "EUA"},
            {n: "Jeff Bezos", usd: 215, o: "Amazon", v: "EUA", setor: "Varejo", e: "Amazon", lat: 47, lng: -122, f: "https://upload.wikimedia.org/wikipedia/commons/6/6c/Jeff_Bezos_at_Amazon_Spheres_Grand_Opening_in_Seattle_-_2018_%2839074799225%29_%28cropped%29.jpg", br: false, uf: "EUA"},
            {n: "Bernard Arnault", usd: 178, o: "LVMH", v: "França", setor: "Moda", e: "LVMH", lat: 46, lng: 2, f: "https://upload.wikimedia.org/wikipedia/commons/d/d4/Bernard_Arnault_2023_%28cropped%29.jpg", br: false, uf: "França"},
            {n: "Eduardo Saverin", usd: 34.5, o: "Facebook", v: "Brasil", setor: "Tecnologia", lat: -23, lng: -46, f: "https://neofeed.com.br/wp-content/uploads/2020/07/saverin.jpg", br: true, uf: "Brasil"}
        ];

        let dadosAtuais = dbBrasil;
        let modo = 'brasil';
        let setorChart, localChart;
        const camadaPins = L.layerGroup().addTo(map);

        // --- INTERFACE ---
        function toggleSidebar(side) {
            const el = document.getElementById(`sidebar-${side}`);
            const btn = document.getElementById(`toggle-${side}`);
            el.classList.toggle('hidden');
            btn.innerText = el.classList.contains('hidden') ? (side === 'left' ? '▶' : '◀') : (side === 'left' ? '◀' : '▶');
            setTimeout(() => map.invalidateSize(), 400);
        }

        function mudarDB() {
            modo = document.getElementById('db-selector').value;
            dadosAtuais = (modo === 'brasil') ? dbBrasil : dbMundo;
            if (modo === 'brasil') map.setView([-15, -50], 4);
            else map.setView([20, 0], 2);
            processar();
        }

        // --- PROCESSAMENTO E GRÁFICOS ---
        function processar() {
            camadaPins.clearLayers();
            const busca = document.getElementById('search').value.toLowerCase();
            const lista = document.getElementById('ranking-list');
            let total = 0; lista.innerHTML = "";
            
            const filtrados = dadosAtuais.filter(p => p.n.toLowerCase().includes(busca)).sort((a,b) => b.usd - a.usd);
            
            // Agregação para Gráficos
            const setoresData = {};
            const localData = {};

            filtrados.forEach((p, i) => {
                total += p.usd;
                
                // Gráficos
                setoresData[p.setor] = (setoresData[p.setor] || 0) + p.usd;
                localData[p.uf] = (localData[p.uf] || 0) + 1;

                // Ranking
                lista.innerHTML += `
                    <div class="ranking-item" onclick="focarPonto(${p.lat}, ${p.lng}, '${p.n}')">
                        <div>
                            <div style="font-weight:600">${p.br ? p.n+' 🇧🇷' : p.n}</div>
                            <span class="badge">${p.setor}</span>
                        </div>
                        <b style="color:var(--accent)">$${p.usd}B</b>
                    </div>`;

                // Pins
                let cor;
                if (modo === 'brasil') {
                    const cores = {'SP':'green','RJ':'red','GO':'gold','RS':'orange','Estrangeiro':'blue'};
                    cor = cores[p.uf] || 'grey';
                } else {
                    cor = p.br ? 'gold' : 'white';
                }

                const icon = new L.Icon({
                    iconUrl: `https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-${cor}.png`,
                    shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                    iconSize: [25, 41], iconAnchor: [12, 41]
                });

                L.marker([p.lat, p.lng], {icon}).addTo(camadaPins).bindPopup(`
                    <div class="popup-card">
                        <img src="${p.f}" class="popup-img">
                        <div style="font-weight:bold; font-size:15px; margin-bottom:5px;">${p.n}</div>
                        <div class="popup-data">
                            <b>💰 Fortuna:</b> US$ ${p.usd} Bi ${p.r ? '/ R$ '+p.r+' Bi' : ''}<br>
                            <b>🏢 Empresas:</b> ${p.e || 'Diversas'}<br>
                            <b>📍 Origem:</b> ${p.v}
                        </div>
                    </div>
                `);
            });

            document.getElementById('total-money').innerText = `$ ${total.toFixed(1)} Bilhões`;
            atualizarGraficos(setoresData, localData);
        }

        function atualizarGraficos(setores, locais) {
            const ctxSetores = document.getElementById('chartSetores').getContext('2d');
            const ctxLocal = document.getElementById('chartLocal').getContext('2d');

            if (setorChart) setorChart.destroy();
            if (localChart) localChart.destroy();

            setorChart = new Chart(ctxSetores, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(setores),
                    datasets: [{
                        data: Object.values(setores),
                        backgroundColor: ['#00d26a', '#3498db', '#f1c40f', '#e74c3c', '#9b59b6', '#e67e22'],
                        borderWidth: 0
                    }]
                },
                options: { plugins: { legend: { display: false } }, cutout: '70%' }
            });

            localChart = new Chart(ctxLocal, {
                type: 'bar',
                data: {
                    labels: Object.keys(locais),
                    datasets: [{
                        label: 'Bilionários',
                        data: Object.values(locais),
                        backgroundColor: '#00d26a'
                    }]
                },
                options: { 
                    indexAxis: 'y',
                    scales: { x: { grid: { display: false }, ticks: { color: '#9ba1a6' } }, y: { ticks: { color: '#fff' } } },
                    plugins: { legend: { display: false } }
                }
            });
        }

        window.focarPonto = function(lat, lng, nome) {
            map.setView([lat, lng], 8);
        };

        processar();
    </script>
</body>
</html>
